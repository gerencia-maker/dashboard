  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .label { font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 1px; text-transform: uppercase; }
    .phone {
      width: 430px;
      height: 932px;
      background: #FAFBFC;
      border-radius: 50px;
      border: 8px solid #333;
      box-shadow: 0 0 0 3px #555, 0 20px 60px rgba(0,0,0,0.5);
      overflow: hidden;
      position: relative;
    }
    .notch {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 160px; height: 32px; background: #333;
      border-radius: 0 0 22px 22px; z-index: 20;
    }
    .notch-pill {
      position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
      width: 80px; height: 8px; background: #1a1a2e; border-radius: 4px;
    }
    .screen {
      width: 100%; height: 100%;
      overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    .screen::-webkit-scrollbar { display: none; }
    .statusbar {
      height: 52px; background: rgba(250,251,252,0.97);
      display: flex; justify-content: space-between;
      align-items: flex-end; padding: 0 28px 8px;
      font-size: 15px; font-weight: 600; color: #1e293b;
      position: sticky; top: 0; z-index: 15;
    }
    button { font-family: inherit; }
    button:active { transform: scale(0.97); }

    /* On mobile: hide label, maximize frame */
    @media (max-width: 600px) {
      .label { display: none; }
      .wrapper { gap: 0; }
    }
  </style>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <script>
    function scalePhone() {
      var phone = document.querySelector('.wrapper');
      if (!phone) return;
      var vw = window.innerWidth;
      var vh = window.innerHeight;
      var frameW = 446; // 430 + 16 border
      var frameH = 948; // 932 + 16 border
      var isMobile = vw <= 600;
      // On mobile: scale up to fill almost entire screen with frame
      // On desktop: scale to fit with some padding
      var padX = isMobile ? 6 : 20;
      var padY = isMobile ? 6 : 40;
      var scaleX = (vw - padX) / frameW;
      var scaleY = (vh - padY) / (isMobile ? frameH : frameH + 40);
      var s = Math.min(scaleX, scaleY, isMobile ? 2 : 1);
      phone.style.transform = 'scale(' + s + ')';
      phone.style.transformOrigin = 'center center';
    }
    window.addEventListener('load', scalePhone);
    window.addEventListener('resize', scalePhone);
  </script>

    function getScore(i) {
      if (i === 0) return null;
      if (i <= 3) return 20;
      if (i <= 5) return 25;
      if (i <= 7) return 35;
      if (i <= 8) return 45;
      if (i <= 10) return 52;
      if (i <= 11) return 65;
      return 72;
    }

    function App() {
      var _a = useState(0), idx = _a[0], set = _a[1];
      var s = steps[idx];
      var score = getScore(idx);
      var sc = !score ? "#94a3b8" : score < 40 ? "#94a3b8" : score < 70 ? "#EAB308" : "#16A34A";
      var pct = ((idx + 1) / steps.length) * 100;

      var _t = useState(null), tx = _t[0], setTx = _t[1];
      function ts(e) { setTx(e.touches[0].clientX); }
      function te(e) {
        if (tx === null) return;
        var d = tx - e.changedTouches[0].clientX;
        if (Math.abs(d) > 50) {
          if (d > 0 && idx < steps.length - 1) set(idx + 1);
          if (d < 0 && idx > 0) set(idx - 1);
        }
        setTx(null);
      }

      return (
        <div onTouchStart={ts} onTouchEnd={te} style={{ background: "#FAFBFC" }}>

          <div style={{
            position: "sticky", top: 0, zIndex: 10,

              <span style={{ fontSize: 15, fontWeight: 700, color: s.pc }}>{s.phase}</span>
              <span style={{ fontSize: 14, color: "#94a3b8" }}>{idx + 1}/{steps.length}</span>
            </div>
            <div style={{ height: 4, borderRadius: 2, background: "#e2e8f0" }}>
              <div style={{ height: "100%", borderRadius: 2, width: pct + "%", background: s.pc, transition: "width 0.3s" }} />
            </div>
          </div>

          {/* Card content */}
          <div style={{ padding: "18px 18px 20px" }}>
            <div style={{ textAlign: "center", marginBottom: 16 }}>
              <div style={{ fontSize: 48, marginBottom: 6 }}>{s.icon}</div>
              <h2 style={{ fontSize: 24, fontWeight: 800, color: "#0f172a", lineHeight: 1.3, margin: "0 0 10px" }}>
                {s.title}
              </h2>
              <div style={{ display: "flex", justifyContent: "center", gap: 6, flexWrap: "wrap" }}>
                <span style={{
                  fontSize: 13, padding: "4px 10px", borderRadius: 8,
                  background: s.pc + "14", color: s.pc, fontWeight: 600,
                }}>{s.plat}</span>
                {s.isNew && (
                  <span style={{
                    fontSize: 13, padding: "4px 10px", borderRadius: 8,
                    background: "#fef3c7", color: "#b45309", fontWeight: 700,
                  }}>{"\u2728"} Nueva</span>
                )}
              </div>
            </div>

            {/* Description */}
            <div style={{
              padding: 18, borderRadius: 14, background: "#fff",
              border: "1px solid #e2e8f0", marginBottom: 12,
              boxShadow: "0 1px 2px rgba(0,0,0,0.03)",
            }}>
              <p style={{ fontSize: 17, lineHeight: 1.7, color: "#334155", margin: 0 }}>{s.desc}</p>
            </div>

            {/* Thought */}
            <div style={{
              padding: "14px 16px", borderRadius: 14,
              background: s.pc + "08", border: "1.5px solid " + s.pc + "20",
              marginBottom: 12, display: "flex", gap: 12, alignItems: "flex-start",
            }}>
              <span style={{ fontSize: 28, flexShrink: 0 }}>{s.emo}</span>
              <div>
                <div style={{ fontSize: 12, color: s.pc, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700, marginBottom: 4 }}>
                  Carmen piensa
                </div>
                <div style={{ fontSize: 16, color: "#475569", fontStyle: "italic", lineHeight: 1.6 }}>{s.thought}</div>

            {/* Action */}
            <div style={{

              </div>
              <div style={{ fontSize: 16, color: "#1e40af", lineHeight: 1.6 }}>{s.action}</div>

            {/* Score */}
            <div style={{
              padding: "14px 16px", borderRadius: 14,
              background: "#fff", border: "1px solid #e2e8f0", marginBottom: 14,

              <div style={{ fontSize: 28, fontWeight: 800, color: sc, minWidth: 60 }}>
                {score === null ? "\u2014" : score}
                {score !== null && <span style={{ fontSize: 15, color: "#94a3b8" }}>/100</span>}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ height: 7, borderRadius: 4, background: "#f1f5f9" }}>

                    width: (score || 0) + "%",
                    background: score >= 70 ? "#16A34A" : score >= 40 ? "#EAB308" : "#94a3b8",

                </div>
                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 3, fontSize: 11, color: "#b0b8c4" }}>

                  border: "1.5px solid #e2e8f0", background: "#fff",
                  color: idx === 0 ? "#cbd5e1" : "#475569",
                }}>{"\u2190"} Anterior</button>
              <button onClick={function() { set(Math.min(steps.length - 1, idx + 1)); }}
                disabled={idx === steps.length - 1}
                style={{
                  flex: 1, padding: "14px", borderRadius: 12, fontSize: 16, fontWeight: 700,
                  cursor: idx === steps.length - 1 ? "default" : "pointer",

                  color: idx === steps.length - 1 ? "#cbd5e1" : s.pc,

            </div>

            {/* Dots */}
            <div style={{ display: "flex", justifyContent: "center", gap: 4, marginTop: 12 }}>
              {steps.map(function(st, i) {
                return (
                  <div key={i} onClick={function() { set(i); }} style={{
                    width: i === idx ? 20 : 7, height: 7, borderRadius: 4,
                    cursor: "pointer", transition: "all 0.3s",
                    background: i === idx ? st.pc : i < idx ? st.pc + "40" : "#ddd",
                  }} />
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
