    function useScreen() {
      var get = function() { return window.innerWidth; };

      useEffect(function() {
        var h = function() { setW(get()); };
        window.addEventListener("resize", h);
        return function() { window.removeEventListener("resize", h); };
      }, []);
      return { w: w, mobile: w < 601, tablet: w >= 601 && w < 960 };
    }

    function UserJourney() {
      var _a = useState(0), activeStep = _a[0], setActiveStep = _a[1];
      var _v = useState("story"), viewMode = _v[0], setViewMode = _v[1];
      var scr = useScreen();

      var step = journeySteps[activeStep];

      // Swipe
      var _t = useState(null), touchX = _t[0], setTouchX = _t[1];
      function onTS(e) { setTouchX(e.touches[0].clientX); }
      function onTE(e) {
        if (touchX === null) return;
        var d = touchX - e.changedTouches[0].clientX;
        if (Math.abs(d) > 50) {
          if (d > 0 && activeStep < journeySteps.length - 1) setActiveStep(activeStep + 1);
          if (d < 0 && activeStep > 0) setActiveStep(activeStep - 1);
        }
        setTouchX(null);
      }

      // Keyboard
      useEffect(function() {
        function onK(e) {
          if (e.key === "ArrowRight") setActiveStep(function(s) { return Math.min(s + 1, journeySteps.length - 1); });
          if (e.key === "ArrowLeft") setActiveStep(function(s) { return Math.max(s - 1, 0); });
        }
        window.addEventListener("keydown", onK);
        return function() { window.removeEventListener("keydown", onK); };
      }, []);

      function getScore() {
        if (activeStep === 0) return null;
        if (activeStep <= 3) return 20;
        if (activeStep <= 5) return 25;
        if (activeStep <= 7) return 35;
        if (activeStep <= 8) return 45;
        if (activeStep <= 10) return 52;
        if (activeStep <= 11) return 65;
        return 72;
      }
      function scoreColor(s) {
        if (!s) return "#94a3b8";
        if (s < 40) return "#94a3b8";
        if (s < 70) return "#EAB308";
        return "#16A34A";
      }
      var score = getScore();

      // Adaptive sizes
      var pad = mob ? 14 : 20;
      var maxW = mob ? "100%" : 760;

                  background: "linear-gradient(90deg, " + step.phaseColor + ", " + step.phaseColor + "bb)",
                  transition: "width 0.4s ease",
                }} />
              </div>
            </div>
          </div>

          {/* === CONTENT === */}
          <div style={{ maxWidth: maxW, margin: "0 auto", padding: mob ? "16px 12px 90px" : "28px 20px 120px" }}>
            {viewMode === "story" ? (
              <div>
                {/* Icon + Title */}
                <div style={{ textAlign: "center", marginBottom: mob ? 18 : 28 }}>
                  <div style={{ fontSize: iconSz, marginBottom: 8 }}>{step.phaseIcon}</div>
                  <h2 style={{
                    fontSize: titleSz, fontWeight: 800, margin: "0 0 10px",
                    color: "#0f172a", lineHeight: 1.3, padding: mob ? "0 4px" : 0,
                  }}>
                    {step.title}
                  </h2>
                  <div style={{ display: "flex", justifyContent: "center", gap: 6, flexWrap: "wrap" }}>
                    <Badge bg={step.phaseColor + "14"} fg={step.phaseColor} border={step.phaseColor + "30"}>
                      {step.platformIcon} {step.platform}
                    </Badge>
                    {step.layer && (
                      <Badge bg={layerMeta[step.layer].color + "14"} fg={layerMeta[step.layer].color} border={layerMeta[step.layer].color + "30"}>
                        {layerMeta[step.layer].label}
                      </Badge>
                    )}
                    {step.isNew && (
                      <Badge bg="#f59e0b14" fg="#d97706" border="#f59e0b30" bold>
                        {"\u2728"} Nueva
                      </Badge>
                    )}
                  </div>
                </div>

                {/* Description */}
                <div style={{
                  padding: mob ? "16px" : "24px", borderRadius: 16, background: "#fff",
                  border: "1px solid #e2e8f0", marginBottom: 12,
                  boxShadow: "0 1px 3px rgba(0,0,0,0.04)",
                }}>
                  <p style={{ fontSize: descSz, lineHeight: 1.8, color: "#334155", margin: 0 }}>
                    {step.description}
                  </p>
                </div>

                {/* Thought */}
                <div style={{
                  padding: mob ? "12px 14px" : "18px 22px", borderRadius: 16,
                  background: step.phaseColor + "08",
                  border: "1.5px solid " + step.phaseColor + "20",
                  marginBottom: 12, display: "flex", gap: mob ? 10 : 14, alignItems: "flex-start",
                }}>
                  <span style={{ fontSize: mob ? 24 : 32, flexShrink: 0, lineHeight: 1 }}>{emotionIcons[step.emotion]}</span>
                  <div>
                    <div style={{
                      fontSize: 11, color: step.phaseColor, textTransform: "uppercase",
                      letterSpacing: 1.2, marginBottom: 4, fontWeight: 700,
                    }}>
                      Carmen piensa
                    </div>
                    <div style={{ fontSize: thoughtSz, color: "#475569", fontStyle: "italic", lineHeight: 1.6 }}>
                      {step.userThought}
                    </div>
                  </div>
                </div>

                {/* Two cols — stack on mobile */}
                <div style={{
                  display: "grid",
                  gridTemplateColumns: mob ? "1fr" : "1fr 1fr",
                  gap: 10,
                }}>
                  <div style={{
                    padding: mob ? "14px" : "18px 20px", borderRadius: 14,
                    background: "#EFF6FF", border: "1px solid #BFDBFE",
                  }}>
                    <div style={{ fontSize: 12, color: "#2563EB", textTransform: "uppercase", letterSpacing: 1, fontWeight: 800, marginBottom: 6 }}>
                      {"\u{1F464}"} Carmen hace
                    </div>
                    <div style={{ fontSize: colSz, color: "#1e40af", lineHeight: 1.6 }}>{step.userAction}</div>
                  </div>
                  <div style={{
                    padding: mob ? "14px" : "18px 20px", borderRadius: 14,
                    background: "#F0FDF4", border: "1px solid #BBF7D0",
                  }}>
                    <div style={{ fontSize: 12, color: "#16A34A", textTransform: "uppercase", letterSpacing: 1, fontWeight: 800, marginBottom: 6 }}>
                      {"\u2699\uFE0F"} Sistema ejecuta
                    </div>
                    <div style={{ fontSize: colSz, color: "#15803d", lineHeight: 1.6 }}>{step.systemAction}</div>
                  </div>
                </div>

                {/* Nav buttons */}
                <div style={{ display: "flex", marginTop: mob ? 20 : 32, gap: mob ? 8 : 14 }}>
                  <button
                    onClick={function() { setActiveStep(Math.max(0, activeStep - 1)); }}
                    disabled={activeStep === 0}
                    style={{
                      flex: 1, padding: mob ? "13px 6px" : "16px", borderRadius: 14,
                      fontSize: btnSz, fontWeight: 600,
                      cursor: activeStep === 0 ? "default" : "pointer",
                      border: "1.5px solid #e2e8f0", background: "#fff",
                      color: activeStep === 0 ? "#cbd5e1" : "#475569",
                    }}
                  >
                    {"\u2190"} Anterior
                  </button>
                  <button
                    onClick={function() { setActiveStep(Math.min(journeySteps.length - 1, activeStep + 1)); }}
                    disabled={activeStep === journeySteps.length - 1}
                    style={{
                      flex: 1, padding: mob ? "13px 6px" : "16px", borderRadius: 14,
                      fontSize: btnSz, fontWeight: 700,
                      cursor: activeStep === journeySteps.length - 1 ? "default" : "pointer",
                      border: "1.5px solid " + step.phaseColor + "50",
                      background: activeStep === journeySteps.length - 1 ? "#f8fafc" : step.phaseColor + "12",
                      color: activeStep === journeySteps.length - 1 ? "#cbd5e1" : step.phaseColor,
                    }}
                  >
                    Siguiente {"\u2192"}
                  </button>
                </div>

                {mob && (
                  <div style={{ textAlign: "center", marginTop: 8, fontSize: 11, color: "#b0b8c4" }}>
                    {"\u2190"} Desliza para navegar {"\u2192"}
                  </div>
                )}
              </div>
            ) : (
              /* === TIMELINE === */
              <div style={{ display: "flex", flexDirection: "column" }}>
                {journeySteps.map(function(s, i) {
                  var isAct = i === activeStep;
                  var isPast = i < activeStep;
                  var dotSz = isAct ? (mob ? 24 : 32) : (mob ? 14 : 20);
                  return (
                    <div key={s.id} style={{ display: "flex", gap: mob ? 10 : 16 }}>
                      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", width: mob ? 24 : 32, flexShrink: 0 }}>
                        <div onClick={function() { setActiveStep(i); }} style={{
                          width: dotSz, height: dotSz, borderRadius: "50%",
                          cursor: "pointer", transition: "all 0.3s",
                          background: isAct ? s.phaseColor : isPast ? s.phaseColor + "30" : "#e2e8f0",
                          border: "2.5px solid " + (isAct || isPast ? s.phaseColor : "#cbd5e1"),
                          display: "flex", alignItems: "center", justifyContent: "center",
                          fontSize: isAct ? (mob ? 10 : 14) : 0, flexShrink: 0, marginTop: 2,
                        }}>
                          {isAct && <span>{s.phaseIcon}</span>}
                        </div>
                        {i < journeySteps.length - 1 && (
                          <div style={{
                            width: 2.5, flex: 1, minHeight: 14,
                            background: isPast ? s.phaseColor + "50" : "#e2e8f0",
                          }} />
                        )}
                      </div>
                      <div onClick={function() { setActiveStep(i); }} style={{
                        flex: 1, padding: mob ? "8px 10px" : "12px 18px",
                        borderRadius: 14, marginBottom: 4, cursor: "pointer",
                        background: isAct ? "#fff" : "transparent",
                        border: "1.5px solid " + (isAct ? s.phaseColor + "35" : "transparent"),
                        boxShadow: isAct ? "0 2px 8px " + s.phaseColor + "12" : "none",
                      }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                          <span style={{
                            fontSize: mob ? 13 : 16, fontWeight: isAct ? 700 : 500,
                            color: isAct ? "#0f172a" : "#64748b", lineHeight: 1.3,
                          }}>
                            {s.title}
                          </span>
                          {s.isNew && (
                            <span style={{
                              fontSize: 9, padding: "1px 5px", borderRadius: 4,
                              background: "#fef3c7", color: "#b45309", fontWeight: 700,
                            }}>NUEVO</span>
                          )}
                        </div>
                        {isAct && (
                          <div style={{ marginTop: 6, fontSize: mob ? 13 : 15, color: "#475569", lineHeight: 1.6 }}>
                            {s.description}
                          </div>
                        )}
                        <div style={{ display: "flex", gap: 6, marginTop: isAct ? 8 : 4, flexWrap: "wrap" }}>
                          <span style={{ fontSize: mob ? 10 : 12, color: "#94a3b8" }}>{s.platformIcon} {s.platform}</span>
                          {s.layer && <span style={{ fontSize: mob ? 10 : 12, color: layerMeta[s.layer].color, fontWeight: 600 }}>{layerMeta[s.layer].label}</span>}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Dots */}
            <div style={{ display: "flex", justifyContent: "center", gap: mob ? 4 : 6, marginTop: 22, flexWrap: "wrap" }}>
              {journeySteps.map(function(s, i) {
                return (
                  <div key={i} onClick={function() { setActiveStep(i); }} style={{
                    width: i === activeStep ? (mob ? 20 : 28) : (mob ? 7 : 10),
                    height: mob ? 7 : 10, borderRadius: 5,
                    cursor: "pointer", transition: "all 0.3s",
                    background: i === activeStep ? s.phaseColor : i < activeStep ? s.phaseColor + "40" : "#e2e8f0",
                  }} />
                );
              })}
            </div>

            {/* Score */}
            <div style={{
              marginTop: 20, padding: mob ? "14px" : "20px 24px", borderRadius: 16,
              background: "#fff", border: "1px solid #e2e8f0",
              boxShadow: "0 1px 3px rgba(0,0,0,0.04)",
            }}>
              <div style={{
                fontSize: mob ? 11 : 13, fontWeight: 700, color: "#64748b",
                textTransform: "uppercase", letterSpacing: 1.2, marginBottom: 10,
              }}>
                Score crediticio de Carmen
              </div>
              <div style={{
                display: "flex", alignItems: "center", gap: mob ? 12 : 16,
                flexDirection: mob ? "column" : "row",
              }}>
                <div style={{
                  fontSize: scoreSz, fontWeight: 800, color: scoreColor(score),
                  minWidth: mob ? "auto" : 80, textAlign: mob ? "center" : "left",
                }}>
                  {score === null ? "\u2014" : score}
                  {score !== null && <span style={{ fontSize: mob ? 14 : 18, color: "#94a3b8" }}>/100</span>}
                </div>
                <div style={{ flex: 1, width: "100%" }}>
                  <div style={{ height: mob ? 8 : 10, borderRadius: 5, background: "#f1f5f9" }}>
                    <div style={{
                      height: "100%", borderRadius: 5, transition: "width 0.5s ease",
                      width: (score || 0) + "%",
                      background: score && score >= 70
                        ? "linear-gradient(90deg, #22C55E, #16A34A)"
                        : score && score >= 40
                          ? "linear-gradient(90deg, #EAB308, #22C55E)"
                          : "#94a3b8",
                    }} />
                  </div>
                  <div style={{
                    display: "flex", justifyContent: "space-between",
                    marginTop: 4, fontSize: mob ? 9 : 11, color: "#94a3b8",
                  }}>
                    <span>Inicio</span>
                    <span style={{ color: "#EAB308" }}>40 \u2014 B\u00E1sicos</span>
                    <span style={{ color: "#16A34A" }}>70 \u2014 Cr\u00E9dito</span>
                    <span>100</span>
                  </div>
                </div>
              </div>
            </div>

            {!mob && (
              <div style={{ textAlign: "center", marginTop: 10, fontSize: 12, color: "#b0b8c4" }}>
                Usa las flechas {"\u2190 \u2192"} del teclado para navegar
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<UserJourney />);
  </script>
</body>
</html>
