<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#1e1b4b" />
  <title>User Journey — Con-Héctor · Eleva · Finsus</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #1e1b4b;
      min-height: 100vh; min-height: 100dvh;
      overflow-x: hidden;
    }
    body::-webkit-scrollbar { display: none; }
    #root { min-height: 100vh; min-height: 100dvh; }
    button { font-family: 'Nunito', sans-serif; }
    button:active { transform: scale(0.95) !important; }
    @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-100px) scale(1.6)} }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    @keyframes glow { 0%,100%{box-shadow:0 0 20px var(--gc,rgba(250,204,21,0.3))} 50%{box-shadow:0 0 50px var(--gc,rgba(250,204,21,0.6))} }
    @keyframes confettiDrop { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(150px) rotate(720deg);opacity:0} }
    @keyframes slideUp { 0%{opacity:0;transform:translateY(40px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes bounceIn { 0%{transform:scale(0) translateX(-50%)} 50%{transform:scale(1.15) translateX(-50%)} 100%{transform:scale(1) translateX(-50%)} }
    @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
    @keyframes starBurst { 0%{transform:scale(0) rotate(0deg);opacity:1} 50%{transform:scale(1.5) rotate(180deg);opacity:.7} 100%{transform:scale(0) rotate(360deg);opacity:0} }
    @keyframes fadeSlideUp { 0%{opacity:0;transform:translateY(20px)} 100%{opacity:1;transform:translateY(0)} }
  </style>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    var P = {
      bg1:"#1e1b4b", bg2:"#252262", card:"rgba(55,48,163,0.25)", cb:"rgba(129,140,248,0.2)",
      text:"#e0e7ff", mut:"#a5b4fc", dim:"#6366f1", acc:"#FACC15", bar:"#312e81"
    };
    var levels = [
      {phase:"Origen",color:"#F97316",icon:"\u{1F3E6}",trophy:"\u{1F4E6}",title:"Cr\u00E9dito rechazado",desc:"Finsus env\u00EDa a Con-H\u00E9ctor la base de microempresarios rechazados. Carmen fue rechazada hace 2 semanas.",action:"Carmen solicit\u00F3 cr\u00E9dito y fue rechazada",thought:"\"Me rechazaron... No s\u00E9 qu\u00E9 hacer.\"",emo:"\u{1F614}",xp:0,ach:null},
      {phase:"Contacto",color:"#34D399",icon:"\u{1F4AC}",trophy:"\u{1F4F2}",title:"Primer mensaje de Con-H\u00E9ctor",desc:"\"Hola Carmen \u{1F44B}, sabemos que buscas hacer crecer tu negocio. Queremos acompa\u00F1arte para acceder a un cr\u00E9dito. \u00BFTe interesa?\"",action:"Responde \"S\u00ED, me interesa\"",thought:"\"\u00BFTodav\u00EDa hay oportunidad?\"",emo:"\u{1F914}",xp:50,ach:"\u{1F31F} Primera conexi\u00F3n"},
      {phase:"Diagn\u00F3stico",color:"#34D399",icon:"\u{1F50D}",trophy:"\u{1F9E9}",title:"Con-H\u00E9ctor entiende su negocio",desc:"Preguntas naturales sobre su tienda de ropa, ingresos y necesidades. Carmen cuenta que vende 15 prendas por semana.",action:"Platica sobre su negocio",thought:"\"Me entiende, no habla como el banco.\"",emo:"\u{1F91E}",xp:80,ach:"\u{1F4CA} Perfil revelado"},
      {phase:"Score",color:"#A78BFA",icon:"\u{1F4CA}",trophy:"\u{1F513}",title:"Score comienza: 20/100",desc:"Invisible para Carmen, Eleva construye su score con datos de Finsus + conversaci\u00F3n. Arranca en 20 puntos.",action:"Todo autom\u00E1tico",thought:"(No sabe que esto pasa)",emo:"\u{1F610}",xp:30,ach:"\u{1F512} Score desbloqueado"},
      {phase:"Invitaci\u00F3n",color:"#FACC15",icon:"\u{1F3AF}",trophy:"\u{1F3C1}",title:"Invitaci\u00F3n a Eleva",desc:"\"Carmen, te acompa\u00F1aremos para que adquieras las habilidades necesarias en finanzas. Empieza con ahorro \u{1F447}\"",action:"Hace clic y llega a Eleva",thought:"\"Si me ayuda al cr\u00E9dito, le entro.\"",emo:"\u{1F4AA}",xp:60,ach:"\u{1F680} Aventura iniciada"},
      {phase:"Registro",color:"#C084FC",icon:"\u270D\uFE0F",trophy:"\u{1F4DD}",title:"Registro en Eleva",desc:"Formulario r\u00E1pido: nombre, tel\u00E9fono, correo, tipo de negocio. El sistema la reconoce autom\u00E1ticamente.",action:"Completa registro",thought:"\"Fue r\u00E1pido, solo lo b\u00E1sico.\"",emo:"\u{1F60A}",xp:40,ach:null},
      {phase:"M\u00F3dulo 1",color:"#38BDF8",icon:"\u{1F4DA}",trophy:"\u{1F4B0}",title:"\"A de Ahorro\" completado",desc:"Videos e infograf\u00EDas sobre ahorro formal e informal, imprevistos y metas. Lo completa desde su celular.",action:"Ve videos y completa m\u00F3dulo",thought:"\"\u00A1Tantas formas de ahorrar!\"",emo:"\u{1F60A}",xp:120,ach:"\u{1F4B0} Maestra del ahorro"},
      {phase:"Refuerzo",color:"#38BDF8",icon:"\u{1F4A1}",trophy:"\u{1F48E}",title:"Micro-lecci\u00F3n personalizada",desc:"\"Separa el 10% de cada venta en un sobre aparte antes de pagar proveedores. \u00A1En un mes tendr\u00E1s colch\u00F3n!\"",action:"Responde \"Gracias, lo intentar\u00E9 \u{1F64F}\"",thought:"\"Se acord\u00F3 de m\u00ED.\"",emo:"\u{1F60A}",xp:60,ach:null},
      {phase:"M\u00F3dulo 2",color:"#38BDF8",icon:"\u{1F4D6}",trophy:"\u{1F9EE}",title:"\"Cuentas Claras\" completado",desc:"Ingresos, gastos, presupuesto y calculadora interactiva para mapear los n\u00FAmeros de su tienda.",action:"Completa m\u00F3dulo y usa calculadora",thought:"\"\u00A1Ahora veo claro mis n\u00FAmeros!\"",emo:"\u{1F4AA}",xp:130,ach:"\u{1F9EE} Cuentas claras"},
      {phase:"Nivel up!",color:"#34D399",icon:"\u{1F4C8}",trophy:"\u{1F31F}",title:"Score: 45 \u2014 Nivel intermedio",desc:"\"\u00A1Vas muy bien! \u{1F4AA} Se desbloquean m\u00F3dulos de deudas sanas y servicios financieros.\"",action:"Explora nuevos m\u00F3dulos",thought:"\"\u00A1Voy avanzando!\"",emo:"\u{1F4AA}",xp:100,ach:"\u2B50 Nivel intermedio"},
      {phase:"Rescate",color:"#FB7185",icon:"\u23F8\uFE0F",trophy:"\u{1F525}",title:"10 d\u00EDas inactiva \u2192 Rescate",desc:"\"Hola Carmen, \u00BFc\u00F3mo va la tienda? \u{1F3EA} Tengo un tip sobre negociar con proveedores.\"",action:"Vuelve: \"S\u00ED, justo ese problema\"",thought:"\"Justo lo que necesitaba.\"",emo:"\u{1F60C}",xp:70,ach:"\u{1F525} Racha recuperada"},
      {phase:"Avanzado",color:"#A78BFA",icon:"\u{1F680}",trophy:"\u{1F393}",title:"M\u00F3dulos avanzados completados",desc:"Deudas sanas, cr\u00E9dito, sobreendeudamiento, transformaci\u00F3n digital. Publica su tienda en la comunidad.",action:"2 m\u00F3dulos + publica en comunidad",thought:"\"Entiendo el cr\u00E9dito. Ya no da miedo.\"",emo:"\u{1F60E}",xp:150,ach:"\u{1F393} Nivel avanzado"},
      {phase:"\u00A1Elegible!",color:"#34D399",icon:"\u{1F3C6}",trophy:"\u{1F3C6}",title:"Score: 72 \u2014 \u00A1ELEGIBLE!",desc:"\"\u00A1Carmen, buenas noticias! \u{1F389} Tu preparaci\u00F3n dio frutos. Puedes acceder al cr\u00E9dito. \u00BFLista?\"",action:"\"\u00A1S\u00ED, claro que s\u00ED!\"",thought:"\"\u00A1Por fin! Voy preparada.\"",emo:"\u{1F929}",xp:200,ach:"\u{1F3C6} Cr\u00E9dito desbloqueado"},
      {phase:"Quiz",color:"#FACC15",icon:"\u{1F4DD}",trophy:"\u{1F4CB}",title:"Quiz de cr\u00E9dito completado",desc:"Cu\u00E1nto necesita ($15,000 MXN), para qu\u00E9 (inventario), capacidad de pago. Candidata viable.",action:"Completa quiz de su negocio",thought:"\"S\u00E9 para qu\u00E9 lo necesito.\"",emo:"\u{1F91E}",xp:100,ach:null},
      {phase:"Cr\u00E9dito",color:"#F97316",icon:"\u{1F3E6}",trophy:"\u{1F451}",title:"Derivada a Finsus \u2014 nuevo perfil",desc:"Score 72, 5 m\u00F3dulos, 6 semanas de historial positivo. Vuelve con perfil mucho m\u00E1s fuerte.",action:"Nueva solicitud en Finsus",thought:"\"Ahora llego con respaldo.\"",emo:"\u{1F929}",xp:250,ach:"\u{1F451} Boss final derrotado"},
      {phase:"Infinito",color:"#34D399",icon:"\u{1F504}",trophy:"\u267E\uFE0F",title:"Game never ends",desc:"Ventas en l\u00EDnea, formalizaci\u00F3n, gesti\u00F3n de deudas. Score crece para futuro re-cr\u00E9dito.",action:"Sigue creciendo su negocio",thought:"\"Realmente estoy aprendiendo.\"",emo:"\u{1F31F}",xp:300,ach:"\u{1F31F} Leyenda"},
    ];

    function Confetti(p) {
      if (!p.show) return null;
      var cols=["#FACC15","#F97316","#34D399","#A78BFA","#FB7185","#38BDF8","#C084FC"];
      var pcs=[];
      for(var i=0;i<30;i++){pcs.push(React.createElement("div",{key:i,style:{
        position:"absolute",left:(Math.random()*100)+"%",top:-10,
        width:8+Math.random()*8,height:8+Math.random()*8,
        borderRadius:Math.random()>0.5?"50%":"2px",
        background:cols[Math.floor(Math.random()*cols.length)],
        animation:"confettiDrop "+(0.8+Math.random()*1.4)+"s ease-out forwards",
        animationDelay:(Math.random()*0.5)+"s",
      }}));}
      return React.createElement("div",{style:{position:"fixed",inset:0,overflow:"hidden",pointerEvents:"none",zIndex:50}},pcs);
    }

    function App() {
      var _i=useState(0),idx=_i[0],setIdx=_i[1];
      var _c=useState(false),done=_c[0],setDone=_c[1];
      var _cf=useState(false),confetti=_cf[0],setConfetti=_cf[1];
      var _xk=useState(null),xpK=_xk[0],setXpK=_xk[1];
      var _xp=useState(0),totalXP=_xp[0],setTotalXP=_xp[1];
      var _ul=useState([]),unlocked=_ul[0],setUnlocked=_ul[1];
      var _sb=useState(false),burst=_sb[0],setBurst=_sb[1];
      var _ach=useState(null),toast=_ach[0],setToast=_ach[1];
      var _tx=useState(null),touchX=_tx[0],setTouchX=_tx[1];

      var lv=levels[idx];
      var score=idx===0?0:idx<=3?20:idx<=5?25:idx<=7?35:idx<=8?45:idx<=10?52:idx<=11?65:72;
      var pct=((idx+1)/levels.length)*100;
      var circ=2*Math.PI*46;

      function complete(){
        if(done)return;
        setDone(true);setConfetti(true);setBurst(true);
        setXpK(Date.now());
        setTotalXP(function(t){return t+lv.xp;});
        if(lv.ach&&unlocked.indexOf(lv.ach)===-1){
          setUnlocked(function(u){return u.concat([lv.ach]);});
          setTimeout(function(){setToast(lv.ach);},600);
          setTimeout(function(){setToast(null);},3200);
        }
        setTimeout(function(){setConfetti(false);setBurst(false);},1600);
      }
      function next(){if(idx<levels.length-1){setIdx(idx+1);setDone(false);}}
      function prev(){if(idx>0){setIdx(idx-1);setDone(true);}}
      function onTS(e){setTouchX(e.touches[0].clientX);}
      function onTE(e){
        if(touchX===null)return;
        var d=touchX-e.changedTouches[0].clientX;
        if(Math.abs(d)>50){if(d>0&&done)next();if(d<0)prev();}
        setTouchX(null);
      }
      useEffect(function(){
        function onK(e){
          if(e.key===" "||e.key==="Enter")complete();
          if(e.key==="ArrowRight"&&done)next();
          if(e.key==="ArrowLeft")prev();
        }
        window.addEventListener("keydown",onK);
        return function(){window.removeEventListener("keydown",onK);};
      });

      return (
        <div onTouchStart={onTS} onTouchEnd={onTE} style={{
          background:"linear-gradient(180deg, #1e1b4b 0%, #252262 40%, #1e1b4b 100%)",
          minHeight:"100vh",minHeight:"100dvh",color:P.text,position:"relative",
          paddingBottom:"env(safe-area-inset-bottom, 0px)",
        }}>
          <Confetti show={confetti} />

          {xpK&&lv.xp>0&&(
            <div key={xpK} style={{
              position:"fixed",top:"35%",left:"50%",transform:"translateX(-50%)",
              fontSize:36,fontWeight:900,color:P.acc,
              textShadow:"0 2px 16px rgba(250,204,21,0.7)",
              animation:"floatUp 1.3s ease-out forwards",
              pointerEvents:"none",zIndex:40,fontFamily:"'Fredoka'",
            }}>+{lv.xp} XP</div>
          )}

          {toast&&(
            <div style={{
              position:"fixed",top:60,left:"50%",
              background:"linear-gradient(135deg,#312e81,#4c1d95)",
              border:"2px solid "+P.acc,borderRadius:18,
              padding:"14px 24px",zIndex:60,textAlign:"center",
              animation:"bounceIn 0.5s ease-out forwards",
              boxShadow:"0 8px 40px rgba(250,204,21,0.3),inset 0 1px 0 rgba(255,255,255,0.1)",
              whiteSpace:"nowrap",
            }}>
              <div style={{fontSize:12,color:P.acc,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>
                {"\u{1F514}"} Logro desbloqueado
              </div>
              <div style={{fontSize:20,fontWeight:800,color:"#fff",fontFamily:"'Fredoka'"}}>{toast}</div>
            </div>
          )}

          {/* HUD */}
          <div style={{
            position:"sticky",top:0,zIndex:10,
            background:"rgba(30,27,75,0.92)",backdropFilter:"blur(16px)",
            borderBottom:"1px solid rgba(129,140,248,0.15)",
            padding:"max(env(safe-area-inset-top,12px),12px) 20px 10px",
          }}>
            <div style={{maxWidth:560,margin:"0 auto"}}>
              <div style={{textAlign:"center",marginBottom:6}}>
                <span style={{fontFamily:"'Fredoka'",fontSize:20,fontWeight:700,color:"#fff",letterSpacing:1}}>
                  e<span style={{color:P.acc}}>{"\u{1F4CD}"}</span>leva
                </span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:14,fontWeight:700,color:lv.color,textTransform:"uppercase",letterSpacing:1.5,fontFamily:"'Fredoka'"}}>
                    Nivel {idx+1}
                  </span>
                  <span style={{
                    fontSize:13,padding:"3px 10px",borderRadius:8,
                    background:"rgba(250,204,21,0.12)",color:P.acc,fontWeight:800,
                    fontFamily:"'Fredoka'",border:"1px solid rgba(250,204,21,0.25)",
                  }}>{"\u2B50"} {totalXP} XP</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:13,color:P.mut}}>Score</span>
                  <span style={{
                    fontSize:20,fontWeight:900,fontFamily:"'Fredoka'",
                    color:score>=70?"#34D399":score>=40?"#FACC15":P.mut,
                    textShadow:score>=70?"0 0 12px rgba(52,211,153,0.4)":score>=40?"0 0 12px rgba(250,204,21,0.3)":"none",
                  }}>{score}</span>
                </div>
              </div>
              <div style={{height:7,borderRadius:4,background:P.bar,position:"relative",overflow:"hidden"}}>
                <div style={{
                  height:"100%",borderRadius:4,width:pct+"%",
                  background:"linear-gradient(90deg,"+lv.color+","+P.acc+")",
                  transition:"width 0.5s ease",boxShadow:"0 0 12px "+lv.color+"50",
                }}/>
                <div style={{
                  position:"absolute",inset:0,borderRadius:4,
                  background:"linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.12) 50%,transparent 100%)",
                  backgroundSize:"200% 100%",animation:"shimmer 2s infinite linear",
                }}/>
              </div>
            </div>
          </div>

          {/* CONTENT */}
          <div style={{maxWidth:560,margin:"0 auto",padding:"20px 20px 40px"}}>
            {/* Trophy ring */}
            <div style={{textAlign:"center",marginBottom:16,position:"relative"}}>
              {burst&&Array.from({length:10}).map(function(_,i){
                var a=(i/10)*360;
                return <div key={i} style={{
                  position:"absolute",top:"50%",left:"50%",width:14,height:14,borderRadius:"50%",
                  background:lv.color,animation:"starBurst 0.9s ease-out forwards",
                  animationDelay:(i*0.04)+"s",
                  transform:"translate(-50%,-50%) rotate("+a+"deg) translateY(-50px)",
                  pointerEvents:"none",
                }}/>;
              })}
              <div style={{position:"relative",display:"inline-block"}}>
                <svg width="120" height="120" style={{transform:"rotate(-90deg)"}}>
                  <circle cx="60" cy="60" r="46" fill="none" stroke={P.bar} strokeWidth="7"/>
                  <circle cx="60" cy="60" r="46" fill="none"
                    stroke={done?lv.color:P.dim} strokeWidth="7"
                    strokeLinecap="round" strokeDasharray={circ}
                    strokeDashoffset={done?0:circ}
                    style={{transition:"stroke-dashoffset 0.9s ease-out,stroke 0.3s",filter:done?"drop-shadow(0 0 10px "+lv.color+")":"none"}}
                  />
                </svg>
                <div style={{
                  position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:done?52:44,animation:done?"pulse 1.2s ease-in-out infinite":"none",transition:"font-size 0.3s",
                }}>{done?lv.trophy:lv.icon}</div>
              </div>
              <h2 style={{
                fontSize:26,fontWeight:900,color:"#fff",lineHeight:1.25,
                margin:"10px 0 8px",fontFamily:"'Fredoka'",animation:"slideUp 0.4s ease-out",
              }}>{lv.title}</h2>
              <span style={{
                display:"inline-block",fontSize:13,padding:"4px 14px",borderRadius:10,
                background:lv.color+"18",color:lv.color,fontWeight:700,border:"1px solid "+lv.color+"35",
              }}>{lv.phase}</span>
            </div>

            {/* Desc */}
            <div style={{
              padding:"18px 20px",borderRadius:18,background:P.card,
              border:"1px solid "+P.cb,marginBottom:12,animation:"fadeSlideUp 0.3s ease-out",
              boxShadow:"inset 0 1px 0 rgba(255,255,255,0.05)",
            }}>
              <p style={{fontSize:17,lineHeight:1.75,color:P.text,margin:0}}>{lv.desc}</p>
            </div>

            {/* Thought */}
            <div style={{
              padding:"14px 18px",borderRadius:18,background:lv.color+"0C",
              border:"1.5px solid "+lv.color+"25",marginBottom:12,
              display:"flex",gap:14,alignItems:"flex-start",animation:"fadeSlideUp 0.4s ease-out",
            }}>
              <span style={{fontSize:30,flexShrink:0}}>{lv.emo}</span>
              <div>
                <div style={{fontSize:11,color:lv.color,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700,marginBottom:4}}>Carmen piensa</div>
                <div style={{fontSize:17,color:P.mut,fontStyle:"italic",lineHeight:1.6}}>{lv.thought}</div>
              </div>
            </div>

            {/* Action */}
            <div style={{
              padding:"14px 18px",borderRadius:18,
              background:"rgba(56,189,248,0.06)",border:"1px solid rgba(56,189,248,0.15)",
              marginBottom:16,animation:"fadeSlideUp 0.5s ease-out",
            }}>
              <div style={{fontSize:11,color:"#38BDF8",textTransform:"uppercase",letterSpacing:1.5,fontWeight:800,marginBottom:4}}>
                {"\u{1F3AE}"} Acci{"\u00F3"}n
              </div>
              <div style={{fontSize:17,color:P.text,lineHeight:1.6}}>{lv.action}</div>
            </div>

            {/* Button */}
            {!done?(
              <button onClick={complete} style={{
                width:"100%",padding:"18px",borderRadius:18,fontSize:20,fontWeight:800,
                cursor:"pointer",border:"2px solid "+lv.color,
                background:"linear-gradient(135deg,"+lv.color+"15,"+lv.color+"35)",
                color:"#fff",position:"relative",overflow:"hidden",fontFamily:"'Fredoka'",
                "--gc":lv.color+"50",animation:"glow 2s ease-in-out infinite",
              }}>
                <div style={{
                  position:"absolute",inset:0,
                  background:"linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent)",
                  backgroundSize:"200% 100%",animation:"shimmer 2s infinite linear",
                }}/>
                {lv.trophy} Completar nivel
              </button>
            ):(
              <div style={{display:"flex",gap:12}}>
                <button onClick={prev} disabled={idx===0} style={{
                  flex:1,padding:"16px",borderRadius:16,fontSize:18,fontWeight:700,
                  cursor:idx===0?"default":"pointer",border:"1.5px solid "+P.cb,
                  background:P.card,color:idx===0?P.dim:P.mut,fontFamily:"'Fredoka'",
                }}>{"\u2190"}</button>
                <button onClick={next} disabled={idx===levels.length-1} style={{
                  flex:3,padding:"16px",borderRadius:16,fontSize:19,fontWeight:800,
                  cursor:idx===levels.length-1?"default":"pointer",
                  border:"2px solid "+(idx===levels.length-1?P.dim:"#34D399"),
                  background:idx===levels.length-1?P.card:"linear-gradient(135deg,rgba(52,211,153,0.15),rgba(52,211,153,0.35))",
                  color:idx===levels.length-1?P.dim:"#fff",fontFamily:"'Fredoka'",
                  boxShadow:idx===levels.length-1?"none":"0 4px 24px rgba(52,211,153,0.2)",
                }}>
                  {idx===levels.length-1?"\u{1F3C6} \u00A1Completado!":"Siguiente nivel \u2192"}
                </button>
              </div>
            )}

            <div style={{textAlign:"center",marginTop:8,fontSize:12,color:P.dim}}>
              {done?"\u2190 Desliza para navegar \u2192":"Toca el bot\u00F3n para completar"}
            </div>

            {/* Dots */}
            <div style={{display:"flex",justifyContent:"center",gap:5,marginTop:14,flexWrap:"wrap"}}>
              {levels.map(function(l,i){
                var d=i<idx||(i===idx&&done);var a=i===idx;
                return <div key={i} onClick={function(){setIdx(i);setDone(i<idx);}} style={{
                  width:a?24:8,height:8,borderRadius:4,cursor:"pointer",transition:"all 0.3s",
                  background:a?l.color:d?l.color+"55":P.bar,
                  boxShadow:a?"0 0 10px "+l.color+"50":"none",
                }}/>;
              })}
            </div>

            {/* Achievements */}
            {unlocked.length>0&&(
              <div style={{marginTop:16,padding:"14px 16px",borderRadius:16,background:P.card,border:"1px solid "+P.cb}}>
                <div style={{fontSize:11,color:P.mut,textTransform:"uppercase",letterSpacing:2,fontWeight:700,marginBottom:8}}>
                  {"\u{1F3C5}"} Logros ({unlocked.length}/{levels.filter(function(l){return l.ach;}).length})
                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {unlocked.map(function(a,i){
                    return <span key={i} style={{
                      fontSize:12,padding:"4px 10px",borderRadius:8,
                      background:"rgba(250,204,21,0.08)",color:P.acc,
                      border:"1px solid rgba(250,204,21,0.18)",fontWeight:700,
                    }}>{a}</span>;
                  })}
                </div>
              </div>
            )}

            {/* Score */}
            <div style={{marginTop:16,padding:"14px 16px",borderRadius:16,background:P.card,border:"1px solid "+P.cb}}>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{
                  fontSize:30,fontWeight:900,fontFamily:"'Fredoka'",
                  color:score>=70?"#34D399":score>=40?"#FACC15":P.mut,minWidth:65,
                }}>
                  {score}<span style={{fontSize:15,color:P.dim}}>/100</span>
                </div>
                <div style={{flex:1}}>
                  <div style={{height:8,borderRadius:4,background:P.bar}}>
                    <div style={{
                      height:"100%",borderRadius:4,transition:"width 0.6s ease",width:score+"%",
                      background:score>=70?"linear-gradient(90deg,#34D399,#10B981)":score>=40?"linear-gradient(90deg,#FACC15,#34D399)":P.dim,
                      boxShadow:score>=70?"0 0 8px rgba(52,211,153,0.4)":score>=40?"0 0 8px rgba(250,204,21,0.3)":"none",
                    }}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:3,fontSize:10,color:P.dim}}>
                    <span>0</span><span style={{color:"#FACC15"}}>40</span><span style={{color:"#34D399"}}>70</span><span>100</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
