function AuthProvider({ children }) {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(FIREBASE_ENABLED);
  
  useEffect(() => {
    if (!FIREBASE_ENABLED || !fbAuth) {
      setLoading(false);
      return;
    }
    const unsub = onAuthStateChanged(fbAuth, (u) => {
      setUser(u);
      setLoading(false);
    });
    return () => unsub();
  }, []);
  
  const signIn = async () => {
    if (!FIREBASE_ENABLED) return;
    try {
      const provider = new GoogleAuthProvider();
      await signInWithPopup(fbAuth, provider);
    } catch (e) {
      console.error('Sign-in error:', e);
      alert('Error al iniciar sesión: ' + e.message);
    }
  };
  
  const doSignOut = async () => {
    if (!FIREBASE_ENABLED) return;
    await fbSignOut(fbAuth);
  };
  
  return React.createElement(AuthContext.Provider, { value: { user, loading, signIn, signOut: doSignOut } }, children);
}

function useAuth() {
  return React.useContext(AuthContext);
}

const fmtCOP = (n) => {
  if (n === 0 || n == null || isNaN(n)) return '$ —';
  const sign = n < 0 ? '(' : '';
  const close = n < 0 ? ')' : '';
  return sign + '$' + Math.abs(Math.round(n)).toLocaleString('en-US') + close;
};
const fmtUSD = (n) => {
  if (n === 0 || n == null || isNaN(n)) return 'US$ —';
  return 'US$ ' + Math.round(Math.abs(n)).toLocaleString('en-US');
};
const fmtPct = (n) => {
  if (n == null || isNaN(n)) return '—';
  return (n * 100).toFixed(1) + '%';
};

  if (n == null || isNaN(n)) return '—';

};

// Parser robusto de decimales: acepta coma o punto, separadores de miles, espacios.
// Si recibe número, lo retorna tal cual. Si la entrada es "" o inválida → NaN.
const parseDecimal = (v) => {
  if (typeof v === 'number') return v;
  if (v == null) return NaN;
  let s = String(v).trim();
  if (!s) return NaN;
  // Quitar espacios y caracteres no numéricos excepto . , -
  s = s.replace(/\s/g, '');
  // Si tiene tanto coma como punto, asumimos que el último separador es decimal
  const lastComma = s.lastIndexOf(',');
  const lastDot = s.lastIndexOf('.');
  if (lastComma > -1 && lastDot > -1) {
    if (lastComma > lastDot) {
      // formato 1.234,56 → quitar puntos, cambiar coma por punto
      s = s.replace(/\./g, '').replace(',', '.');
    } else {
      // formato 1,234.56 → quitar comas
      s = s.replace(/,/g, '');
    }
  } else if (lastComma > -1) {
    // solo coma → tratar como decimal
    s = s.replace(',', '.');
  }
  // ya solo punto, o ningún separador
  const n = parseFloat(s);
  return isNaN(n) ? NaN : n;
};

// DecimalInput: input controlado con buffer string interno.
// Acepta coma o punto como decimal mientras se escribe; al perder foco emite el número parseado.
function DecimalInput({ value, onChange, className, placeholder, ...rest }) {
  const [buf, setBuf] = useState('');
  const [focused, setFocused] = useState(false);
  const display = focused ? buf : (value == null || value === '' || isNaN(value) ? '' : String(value));
  return (
    <input
      type="text"
      inputMode="decimal"
      value={display}
      placeholder={placeholder}
      onFocus={(e) => { setBuf(value == null || value === '' || isNaN(value) ? '' : String(value)); setFocused(true); }}
      onChange={(e) => { setBuf(e.target.value); }}
      onBlur={(e) => {
        setFocused(false);
        const n = parseDecimal(buf);
        if (isNaN(n)) {
          onChange(0);
        } else {
          onChange(n);
        }
      }}
      className={className}
      {...rest}
    />
  );
}

// Fetch official TRM (Banco de la República via datos.gov.co)
async function fetchOfficialTRM() {
  try {
    const today = new Date().toISOString().slice(0, 10);
    const params = new URLSearchParams({
      '$where': `vigenciadesde<='${today}T00:00:00.000' AND vigenciahasta>='${today}T00:00:00.000'`,
      '$limit': '1'
    });
    const url = `https://www.datos.gov.co/resource/32sa-8pi3.json?${params}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data.length) throw new Error('Sin datos TRM');
    const trm = parseFloat(data[0].valor);
    const fechaVigencia = data[0].vigenciadesde.slice(0, 10);
    if (!trm || isNaN(trm)) throw new Error('TRM inválida');
    return { trm, fechaVigencia };
  } catch (err) {
    console.warn('No se pudo obtener TRM oficial:', err.message);
    return null;
  }
}

// Fetch BTC price in USD from CoinGecko (free, no API key, CORS open)
async function fetchBTCPrice() {
  try {
    const url = 'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd';
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const price = data?.bitcoin?.usd;
    if (!price || isNaN(price)) throw new Error('Precio BTC inválido');
    return { price, fetchedAt: new Date().toISOString() };
  } catch (err) {
    console.warn('No se pudo obtener precio BTC:', err.message);
    return null;
  }
}

// Persist hook — uses Firestore when authenticated, localStorage as fallback
function usePersistent(key, defaultValue) {
  const { user } = useAuth();
  const [value, setValue] = useState(defaultValue);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    if (FIREBASE_ENABLED && user && fbDb) {
      // Real-time Firestore listener under users/{uid}/data/{key}
      const docKey = key.replace('papa:', '');
      const docRef = doc(fbDb, 'users', user.uid, 'data', docKey);
      const unsub = onSnapshot(docRef, (snap) => {
        if (snap.exists()) {
          setValue(snap.data().value);
        } else {
          // First time for this user - migrate from localStorage if exists
          let initial = defaultValue;
          try {
            const stored = localStorage.getItem(key);
            if (stored) initial = JSON.parse(stored);
          } catch {}
          setValue(initial);
          setDoc(docRef, { value: initial, updatedAt: new Date().toISOString() }).catch(console.error);
        }
        setLoaded(true);
      }, (err) => {
        console.error('Firestore listen error:', err);
        setLoaded(true);
      });
      return () => unsub();
    } else {
      // localStorage fallback
      try {
        const stored = localStorage.getItem(key);
        if (stored) setValue(JSON.parse(stored));
      } catch {}
      setLoaded(true);
    }
  }, [key, user]);

  const updateValue = (newValue) => {
    setValue((current) => {
      const v = typeof newValue === 'function' ? newValue(current) : newValue;
      if (FIREBASE_ENABLED && user && fbDb) {
        const docKey = key.replace('papa:', '');
        setDoc(doc(fbDb, 'users', user.uid, 'data', docKey),
               { value: v, updatedAt: new Date().toISOString() }).catch(e => {
          console.error('Firestore write error:', e);
        });
      } else {
        try {
          localStorage.setItem(key, JSON.stringify(v));
        } catch (e) {
          console.error('localStorage error', e);
        }
      }
      return v;
    });
  };

  return [value, updateValue, loaded];
}

function MainApp() {
  const { user, signOut } = useAuth();
  const [config, setConfig] = usePersistent('papa:config', SEED_CONFIG);
  const [portfolio, setPortfolio] = usePersistent('papa:portfolio', SEED_PORTFOLIO);
  const [expenses, setExpenses] = usePersistent('papa:expenses', SEED_EXPENSES);
  const [incomes, setIncomes] = usePersistent('papa:incomes', SEED_INCOMES);
  const [tab, setTab] = useState('dashboard');
  const [trmStatus, setTrmStatus] = useState('idle'); // idle | fetching | updated | failed

  // Auto-update TRM oficial on app load (once per day)
  useEffect(() => {
    const today = new Date().toISOString().slice(0, 10);
    if (config.lastTrmUpdate === today) return; // already updated today
    setTrmStatus('fetching');
    fetchOfficialTRM().then(result => {
      if (result) {
        setConfig(c => ({ ...c, trm: result.trm, lastTrmUpdate: today, trmFechaVigencia: result.fechaVigencia }));
        setTrmStatus('updated');
      } else {
        setTrmStatus('failed');
      }
    });
  }, []); // run once on mount

  // Computed
  const computed = useMemo(() => {
    const totalPatrimonio = portfolio.reduce((s, a) => s + (a.saldo || 0), 0);
    const liquido = portfolio.filter(a => a.estado === 'LIQUIDO').reduce((s, a) => s + (a.saldo || 0), 0);
    const bloqueado = portfolio.filter(a => a.estado === 'BLOQUEADO').reduce((s, a) => s + (a.saldo || 0), 0);
    const rentabilidadAnual = portfolio.reduce((s, a) => s + (a.saldo || 0) * (a.tasa || 0), 0);
    const pensionAnual = (config.pension || 0) * 12;

    // Year breakdown
    const yearMap = {};
    expenses.forEach(e => {
      if (!e.anio) return;
      yearMap[e.anio] = (yearMap[e.anio] || 0) + e.gasto;
    });
    const yearBreakdown = Object.entries(yearMap).map(([y, v]) => ({ year: parseInt(y), total: v })).sort((a, b) => a.year - b.year);

    // Dest breakdown
    const destMap = {};
    expenses.forEach(e => {
      const d = e.destinatario || 'OTRO';
      destMap[d] = (destMap[d] || 0) + e.gasto;
    });
    const destBreakdown = Object.entries(destMap).map(([d, v]) => ({ name: d, total: v })).sort((a, b) => b.total - a.total);

    const totalGastos = expenses.reduce((s, e) => s + e.gasto, 0);

    // Avg historical (years < proj year)
    const histYears = yearBreakdown.filter(y => y.year < config.yearProj);
    const gastoPromedio = histYears.length ? histYears.reduce((s, y) => s + y.total, 0) / histYears.length : 0;

    // Incomes
    const incomeYearMap = {};
    incomes.forEach(e => {
      if (!e.anio) return;
      incomeYearMap[e.anio] = (incomeYearMap[e.anio] || 0) + e.monto;
    });
    const incomeYearBreakdown = Object.entries(incomeYearMap).map(([y, v]) => ({ year: parseInt(y), total: v })).sort((a,b) => a.year - b.year);

    const incomeSourceMap = {};
    incomes.forEach(e => {
      const o = e.origen || 'OTRO';
      incomeSourceMap[o] = (incomeSourceMap[o] || 0) + e.monto;
    });
    const incomeSourceBreakdown = Object.entries(incomeSourceMap).map(([o, v]) => ({ name: o, total: v })).sort((a,b) => b.total - a.total);

    const totalIngresos = incomes.reduce((s, e) => s + e.monto, 0);
    const histIncYears = incomeYearBreakdown.filter(y => y.year < config.yearProj);
    const ingresoPromedio = histIncYears.length ? histIncYears.reduce((s, y) => s + y.total, 0) / histIncYears.length : 0;
    const balanceNeto = totalIngresos - totalGastos;

    // Top 10
    const top10 = [...expenses].sort((a, b) => b.gasto - a.gasto).slice(0, 10);

    // Projection 2026: 8 months May-Dec
    const monthlyRent = rentabilidadAnual / 12;
    const monthlyExpExpected = (gastoPromedio / 12) * (1 + config.growthExpenses);
    const months = ['May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
    const projection = [];
    let saldo = liquido;
    months.forEach((m, i) => {
      const ingreso = config.pension + monthlyRent;
      const gasto = monthlyExpExpected;
      const flujo = ingreso - gasto;
      saldo = saldo + flujo;
      projection.push({ mes: m, ingreso, gasto, flujo, saldo });
    });

    // Scenarios
    const nMonths = 8;
    const scenarios = [
      { name: 'CONSERVADOR', adjRent: config.scenarioConservativeRent, adjExp: config.scenarioConservativeExp, color: '#EF4444' },
      { name: 'BASE', adjRent: 0, adjExp: 0, color: '#1F2937' },
      { name: 'OPTIMISTA', adjRent: config.scenarioOptimistRent, adjExp: config.scenarioOptimistExp, color: '#10B981' },
    ].map(s => {
      const ing = config.pension * nMonths + rentabilidadAnual * (nMonths / 12) * (1 + s.adjRent);
      const gas = (gastoPromedio / 12) * (1 + config.growthExpenses) * (1 + s.adjExp) * nMonths;
      const flujo = ing - gas;
      const saldoFinal = liquido + flujo;
      return { ...s, ing, gas, flujo, saldoFinal };
    });

    return {
      totalPatrimonio, liquido, bloqueado, rentabilidadAnual, pensionAnual,
      yearBreakdown, destBreakdown, totalGastos, gastoPromedio, top10,
      projection, scenarios,
      incomeYearBreakdown, incomeSourceBreakdown, totalIngresos, ingresoPromedio, balanceNeto
    };
  }, [portfolio, expenses, incomes, config]);

  return (
    <div className="min-h-screen bg-stone-50 text-stone-900 font-body">
      <FontStyles />

      {/* Header */}
      <div className="border-b-4 border-orange-500 bg-stone-900">
        <div className="max-w-[1400px] mx-auto px-6 py-5 flex items-center justify-between">
          <div>
            <div className="flex items-baseline gap-3">
              <h1 className="font-display text-3xl font-medium text-white tracking-tight">Control Financiero Papá</h1>
              <span className="text-orange-400 text-sm font-mono">v2.0</span>
            </div>
            <p className="text-stone-400 text-xs mt-1 tracking-wide">Patrimonio · Gastos · Proyección</p>
          </div>
          <div className="flex items-center gap-4">
            <div className="flex items-center gap-1.5 text-stone-400 text-xs">
              {FIREBASE_ENABLED && user ? (
                <span className="flex items-center gap-1.5 text-emerald-400" title="Sincronizado en la nube">
                  <Cloud size={12} /> <span className="hidden md:inline font-mono">{user.email}</span>
                </span>
              ) : (
                <span className="flex items-center gap-1.5 text-stone-500" title="Datos solo en este navegador">
                  <CloudOff size={12} /> <span className="hidden md:inline font-mono">local</span>
                </span>
              )}
            </div>
            <div className="flex flex-col items-end text-stone-400 text-xs">
              <div className="flex items-center gap-2">
                <span className="font-mono">TRM</span>
                <span className="font-mono text-white text-base">${config.trm.toLocaleString()}</span>
                {trmStatus === 'fetching' && <span className="text-amber-400 text-[10px] animate-pulse">·</span>}
                {trmStatus === 'updated' && <span className="text-emerald-400 text-[10px]" title="TRM actualizada automáticamente desde datos.gov.co">●</span>}
                {trmStatus === 'failed' && <span className="text-red-400 text-[10px]" title="No se pudo actualizar TRM, usando última conocida">○</span>}
              </div>
              {config.trmFechaVigencia && (
                <span className="text-[10px] text-stone-500 font-mono">
                  vig. {config.trmFechaVigencia}
                </span>
              )}
            </div>
            {FIREBASE_ENABLED && user && (
              <button onClick={signOut} className="text-stone-400 hover:text-white" title="Cerrar sesión">
                <LogOut size={14} />
              </button>
            )}
          </div>
        </div>

        {/* Tabs */}
        <div className="max-w-[1400px] mx-auto px-6">
          <div className="flex gap-1">
            {[
              { id: 'dashboard', label: 'Dashboard', icon: BarChart3 },
              { id: 'ingresos', label: 'Ingresos', icon: ArrowRight },
              { id: 'gastos', label: 'Gastos', icon: List },
              { id: 'portafolio', label: 'Portafolio', icon: PieIcon },
              { id: 'proyeccion', label: 'Proyección', icon: TrendingUp },
              { id: 'config', label: 'Configuración', icon: Settings },
            ].map(t => {
              const Icon = t.icon;
              const active = tab === t.id;
              return (
                <button key={t.id} onClick={() => setTab(t.id)}
                  className={`flex items-center gap-2 px-4 py-3 text-sm font-medium tracking-wide transition-all border-b-2 ${active ? 'text-white border-orange-500 bg-stone-800' : 'text-stone-400 border-transparent hover:text-white hover:bg-stone-800/50'}`}>
                  <Icon size={14} />
                  {t.label}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      <div className="max-w-[1400px] mx-auto px-6 py-6">
        {tab === 'dashboard' && <DashboardTab computed={computed} config={config} portfolio={portfolio} />}
        {tab === 'ingresos' && <IngresosTab incomes={incomes} setIncomes={setIncomes} config={config} />}
        {tab === 'gastos' && <GastosTab expenses={expenses} setExpenses={setExpenses} config={config} />}
        {tab === 'portafolio' && <PortfolioTab portfolio={portfolio} setPortfolio={setPortfolio} config={config} computed={computed} />}
        {tab === 'proyeccion' && <ProjectionTab computed={computed} config={config} />}
        {tab === 'config' && <ConfigTab config={config} setConfig={setConfig} setPortfolio={setPortfolio} setExpenses={setExpenses} setIncomes={setIncomes} />}
      </div>

      <div className="max-w-[1400px] mx-auto px-6 pb-8 pt-4 border-t border-stone-200 mt-8">
        <p className="text-xs text-stone-500 font-mono">Tus cambios se guardan automáticamente. Puedes cerrar esta ventana y volver — la información persiste.</p>
      </div>
    </div>
  );
}

function ChartCard({ title, children }) {

function PortfolioTab({ portfolio, setPortfolio, config, computed }) {
  const [editingId, setEditingId] = useState(null);
  const [draft, setDraft] = useState(null);
  const [btcStatus, setBtcStatus] = useState('idle'); // idle | loading | updated | failed

  const isBitcoin = (a) => a && (a.id === 3 || /bitcoin/i.test(a.nombre || ''));

  const startEdit = (a) => { setEditingId(a.id); setDraft({ ...a }); };
  const saveEdit = () => {
    setPortfolio(portfolio.map(a => {
      if (a.id !== editingId) return a;
      const updated = { ...draft, tasa: parseDecimal(draft.tasa) || 0 };
      if (isBitcoin(updated)) {
        const cantidad = parseDecimal(updated.cantidad);
        const precioUSD = parseDecimal(updated.precioUSD);
        const cantValid = !isNaN(cantidad) && cantidad > 0;
        const priceValid = !isNaN(precioUSD) && precioUSD > 0;
        updated.cantidad = cantValid ? cantidad : 0;
        updated.precioUSD = priceValid ? precioUSD : 0;
        if (cantValid && priceValid) {
          // Recalcular saldo desde cantidad × precio × TRM
          updated.saldo = Math.round(cantidad * precioUSD * (config.trm || 0));
        } else {
          // Mantener saldo manual previo si falta uno de los dos
          updated.saldo = parseDecimal(updated.saldo) || a.saldo || 0;
        }
      } else {
        updated.saldo = parseDecimal(updated.saldo) || 0;
      }
      return updated;
    }));
    setEditingId(null); setDraft(null);
  };
  const cancelEdit = () => { setEditingId(null); setDraft(null); };

  const refreshBTCPrice = async () => {
    setBtcStatus('loading');
    const r = await fetchBTCPrice();
    if (!r) { setBtcStatus('failed'); setTimeout(() => setBtcStatus('idle'), 3000); return; }
    if (draft && isBitcoin(draft)) {
      // Si estamos editando Bitcoin, actualizamos el draft (saldo se recalcula al guardar)
      setDraft({ ...draft, precioUSD: r.price, precioFetchedAt: r.fetchedAt });
    } else {
      // Si no, actualizamos directamente el portafolio. Solo recalcular saldo si cantidad > 0.
      setPortfolio(portfolio.map(a => {
        if (!isBitcoin(a)) return a;
        const cantidad = parseDecimal(a.cantidad);
        const valid = !isNaN(cantidad) && cantidad > 0;
        return {
          ...a,
          precioUSD: r.price,
          precioFetchedAt: r.fetchedAt,
          saldo: valid ? Math.round(cantidad * r.price * (config.trm || 0)) : a.saldo
        };
      }));
    }
    setBtcStatus('updated');
    setTimeout(() => setBtcStatus('idle'), 3000);
  };

  const total = computed.totalPatrimonio;
  const portfolioChartData = portfolio.map((a, i) => ({ name: a.etiqueta, value: a.saldo, color: ASSET_COLORS[i] }));
  const draftBtcSaldo = (() => {
    if (!draft || !isBitcoin(draft)) return 0;
    const cantidad = parseDecimal(draft.cantidad);
    const precioUSD = parseDecimal(draft.precioUSD);
    if (!isNaN(cantidad) && cantidad > 0 && !isNaN(precioUSD) && precioUSD > 0) {
      return Math.round(cantidad * precioUSD * (config.trm || 0));
    }
    return parseDecimal(draft.saldo) || 0;
  })();

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div className="lg:col-span-2 bg-white border border-stone-200">
          <div className="bg-stone-900 text-white px-4 py-2.5 flex items-center justify-between">
            <h3 className="font-display text-base">Portafolio de inversiones</h3>
            <span className="text-xs text-stone-400 font-mono">{portfolio.length} posiciones</span>
          </div>
          <table className="w-full text-sm">
            <thead className="bg-stone-100 text-[10px] uppercase tracking-wider text-stone-600">
              <tr>
                <th className="px-3 py-2 text-left">Activo</th>
                <th className="px-3 py-2 text-right">Saldo COP</th>
                <th className="px-3 py-2 text-right">% Patrim</th>
                <th className="px-3 py-2 text-center">Estado</th>
                <th className="px-3 py-2 text-right">Tasa</th>
                <th className="px-3 py-2 text-right">Rent. anual</th>
                <th className="px-3 py-2"></th>
              </tr>
            </thead>
            <tbody className="divide-y divide-stone-100">
              {portfolio.map((a, i) => {
                const editing = editingId === a.id;
                const rent = (a.saldo || 0) * (a.tasa || 0);
                const btc = isBitcoin(a);
                return (
                  <React.Fragment key={a.id}>
                  <tr className="hover:bg-stone-50">
                    {editing ? (
                      <>
                        <td className="px-3 py-2">
                          <input value={draft.nombre} onChange={e => setDraft({...draft, nombre: e.target.value})} className="w-full border border-stone-300 px-2 py-1 text-sm" />
                          <input value={draft.etiqueta} onChange={e => setDraft({...draft, etiqueta: e.target.value})} placeholder="Etiqueta gráficas" className="w-full border border-stone-300 px-2 py-1 text-xs mt-1" />
                        </td>
                        <td className="px-3 py-2">
                          {btc ? (
                            <div className="w-32 px-2 py-1 text-right num font-semibold text-stone-700 bg-stone-100 border border-stone-200">{fmtCOP(draftBtcSaldo)}</div>
                          ) : (
                            <input type="text" inputMode="decimal" value={draft.saldo} onChange={e => setDraft({...draft, saldo: e.target.value})} className="w-32 border border-stone-300 px-2 py-1 text-right num bg-yellow-50 text-blue-700" />
                          )}
                        </td>
                        <td className="px-3 py-2 text-right text-stone-400 num">—</td>
                        <td className="px-3 py-2 text-center">
                          <select value={draft.estado} onChange={e => setDraft({...draft, estado: e.target.value})} className="border border-stone-300 px-2 py-1 text-xs">
                            <option>LIQUIDO</option><option>BLOQUEADO</option>
                          </select>
                        </td>
                        <td className="px-3 py-2"><input type="text" inputMode="decimal" value={draft.tasa} onChange={e => setDraft({...draft, tasa: e.target.value})} className="w-20 border border-stone-300 px-2 py-1 text-right num bg-yellow-50 text-blue-700" /></td>
                        <td className="px-3 py-2 text-right num text-stone-400">—</td>
                        <td className="px-3 py-2 flex gap-1">
                          <button onClick={saveEdit} className="p-1 bg-emerald-500 text-white hover:bg-emerald-600"><Save size={14} /></button>
                          <button onClick={cancelEdit} className="p-1 bg-stone-200 hover:bg-stone-300"><X size={14} /></button>
                        </td>
                      </>
                    ) : (
                      <>
                        <td className="px-3 py-2">
                          <div className="font-medium text-stone-900">{a.nombre}</div>
                          <div className="text-[11px] text-stone-500">
                            {a.categoria} · {a.disponibilidad}
                            {btc && a.cantidad > 0 && (
                              <span className="ml-2 text-orange-600 font-mono">{fmtBTC(a.cantidad)} BTC @ US$ {fmtNum(a.precioUSD)}</span>
                            )}
                          </div>
                        </td>
                        <td className="px-3 py-2 text-right num font-semibold">{fmtCOP(a.saldo)}<div className="text-[10px] text-emerald-700 num font-normal">{fmtUSD(a.saldo / config.trm)}</div></td>
                        <td className="px-3 py-2 text-right num text-stone-700">{fmtPct(a.saldo / total)}</td>
                        <td className="px-3 py-2 text-center">
                          <span className={`px-2 py-0.5 text-[10px] font-bold rounded-sm ${a.estado === 'LIQUIDO' ? 'bg-emerald-100 text-emerald-700' : 'bg-purple-100 text-purple-700'}`}>{a.estado}</span>
                        </td>
                        <td className="px-3 py-2 text-right num text-blue-600 font-semibold">{fmtPct(a.tasa)}</td>
                        <td className="px-3 py-2 text-right num text-stone-700">{fmtCOP(rent)}</td>
                        <td className="px-3 py-2"><button onClick={() => startEdit(a)} className="text-stone-400 hover:text-orange-500"><Pencil size={14} /></button></td>
                      </>
                    )}
                  </tr>
                  {editing && btc && (
                    <tr className="bg-orange-50">
                      <td colSpan={7} className="px-3 py-3 border-t border-orange-100">
                        <div className="flex flex-wrap items-end gap-3">
                          <div className="flex-1 min-w-[140px]">
                            <label className="text-[10px] uppercase tracking-wider text-orange-700 block mb-1 font-semibold">Cantidad BTC</label>
                            <input type="text" inputMode="decimal" value={draft.cantidad ?? ''} onChange={e => setDraft({...draft, cantidad: e.target.value})} placeholder="0.00000000" className="w-full border border-orange-300 px-2 py-1.5 text-sm text-right num bg-yellow-50 text-blue-700 font-semibold" />
                          </div>
                          <div className="flex-1 min-w-[140px]">
                            <label className="text-[10px] uppercase tracking-wider text-orange-700 block mb-1 font-semibold">Precio USD/BTC</label>
                            <input type="text" inputMode="decimal" value={draft.precioUSD ?? ''} onChange={e => setDraft({...draft, precioUSD: e.target.value})} className="w-full border border-orange-300 px-2 py-1.5 text-sm text-right num bg-yellow-50 text-blue-700 font-semibold" />
                          </div>
                          <div className="flex-1 min-w-[140px]">
                            <label className="text-[10px] uppercase tracking-wider text-stone-500 block mb-1">Saldo COP (auto)</label>
                            <div className="w-full border border-stone-200 bg-stone-100 px-2 py-1.5 text-sm text-right num font-semibold text-stone-700">{fmtCOP(draftBtcSaldo)}</div>
                            <div className="text-[10px] text-emerald-700 num text-right mt-0.5">{fmtUSD(draftBtcSaldo / (config.trm || 1))}</div>
                          </div>
                          <button onClick={refreshBTCPrice} disabled={btcStatus === 'loading'} className="flex items-center gap-1.5 bg-orange-500 hover:bg-orange-600 disabled:bg-stone-300 text-white px-3 py-1.5 text-xs font-medium rounded-sm">
                            <RefreshCw size={12} className={btcStatus === 'loading' ? 'animate-spin' : ''} />

                        <div className="text-[10px] text-stone-500 mt-2 font-mono">
                          TRM aplicada: ${(config.trm || 0).toLocaleString('en-US')}

                          · Fórmula: cantidad × precio USD × TRM

              })}
              <tr className="bg-stone-900 text-white">
                <td className="px-3 py-3 font-display text-base">TOTAL</td>

                <td className="px-3 py-3 text-right num">100%</td>
                <td></td>
                <td></td>

function GastosTab({ expenses, setExpenses, config }) {
  const [search, setSearch] = useState('');
  const [filterYear, setFilterYear] = useState('');
  const [filterDest, setFilterDest] = useState('');
  const [editing, setEditing] = useState(null);
  const [showNew, setShowNew] = useState(false);
  const [showDups, setShowDups] = useState(false);

  const years = useMemo(() => [...new Set(expenses.map(e => e.anio).filter(Boolean))].sort(), [expenses]);
  const dests = useMemo(() => [...new Set(expenses.map(e => e.destinatario))].sort(), [expenses]);

  // Detect duplicates: group by descripcion+gasto+destinatario+anio+fecha
  const dupGroups = useMemo(() => {
    const map = {};
    expenses.forEach(e => {
      const key = `${(e.descripcion||'').trim().toUpperCase()}|${e.gasto}|${e.destinatario}|${e.anio||''}|${e.fecha||''}`;
      if (!map[key]) map[key] = [];
      map[key].push(e);
    });
    return Object.values(map).filter(g => g.length > 1).sort((a,b) => b[0].gasto - a[0].gasto);
  }, [expenses]);

  const dupAmount = useMemo(() => dupGroups.reduce((s, g) => s + g[0].gasto * (g.length - 1), 0), [dupGroups]);

  const handleRemoveDuplicates = (group) => {
    // Keep first, remove rest
    const idsToRemove = group.slice(1).map(e => e.id);
    setExpenses(expenses.filter(e => !idsToRemove.includes(e.id)));
  };

  const handleRemoveAllDuplicates = () => {
    if (!confirm(`¿Eliminar ${dupGroups.reduce((s,g)=>s+g.length-1,0)} duplicados? (Se conserva 1 de cada grupo)`)) return;
    const idsToRemove = new Set();
    dupGroups.forEach(g => g.slice(1).forEach(e => idsToRemove.add(e.id)));
    setExpenses(expenses.filter(e => !idsToRemove.has(e.id)));
  };

  const filtered = useMemo(() => {
    return expenses.filter(e => {
      if (filterYear && e.anio !== parseInt(filterYear)) return false;
      if (filterDest && e.destinatario !== filterDest) return false;
      if (search && !e.descripcion.toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    }).sort((a, b) => (b.anio || 0) - (a.anio || 0) || (b.id || 0) - (a.id || 0));
  }, [expenses, search, filterYear, filterDest]);

  const totalFiltered = filtered.reduce((s, e) => s + e.gasto, 0);

  const handleSave = (e) => {
    if (e.id && expenses.find(x => x.id === e.id)) {
      setExpenses(expenses.map(x => x.id === e.id ? e : x));
    } else {
      const newId = Math.max(0, ...expenses.map(x => x.id || 0)) + 1;
      setExpenses([...expenses, { ...e, id: newId }]);
    }
    setEditing(null);
    setShowNew(false);
  };
  const handleDelete = (id) => {
    if (confirm('¿Eliminar este gasto?')) setExpenses(expenses.filter(x => x.id !== id));
  };

  return (
    <div className="space-y-4">
      <div className="bg-white border border-stone-200 p-3">
        <div className="flex items-center gap-3 flex-wrap">
          <div className="flex items-center gap-2 flex-1 min-w-[200px]">
            <Search size={14} className="text-stone-400" />
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar en descripción..." className="flex-1 outline-none text-sm" />
          </div>
          <select value={filterYear} onChange={e => setFilterYear(e.target.value)} className="border border-stone-300 px-2 py-1 text-sm">
            <option value="">Todos los años</option>
            {years.map(y => <option key={y} value={y}>{y}</option>)}
          </select>
          <select value={filterDest} onChange={e => setFilterDest(e.target.value)} className="border border-stone-300 px-2 py-1 text-sm">
            <option value="">Todos</option>
            {dests.map(d => <option key={d} value={d}>{d}</option>)}
          </select>
          <button onClick={() => setShowDups(!showDups)}
            className={`flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium border ${showDups ? 'bg-amber-500 hover:bg-amber-600 text-white border-amber-500' : 'bg-white hover:bg-amber-50 text-amber-700 border-amber-300'}`}>
            <Copy size={14} /> {dupGroups.length > 0 ? `${dupGroups.length} duplicados` : 'Sin duplicados'}
          </button>
          <button onClick={() => setShowNew(true)} className="flex items-center gap-1.5 bg-orange-500 hover:bg-orange-600 text-white px-3 py-1.5 text-sm font-medium">
            <Plus size={14} /> Nuevo gasto
          </button>
        </div>
        <div className="text-xs text-stone-500 mt-2 font-mono">{filtered.length} gastos · Total: <span className="text-stone-900 font-semibold">{fmtCOP(totalFiltered)}</span> · {fmtUSD(totalFiltered / config.trm)}</div>
      </div>

      {showDups && <DuplicatesPanel dupGroups={dupGroups} onRemove={handleRemoveDuplicates} onRemoveAll={handleRemoveAllDuplicates} dupAmount={dupAmount} />}

      {showNew && <ExpenseForm onSave={handleSave} onCancel={() => setShowNew(false)} dests={[...dests, 'PAPA', 'RANDY', 'LUZ', 'Angela', 'JOHANN'].filter((v, i, a) => a.indexOf(v) === i)} />}
      {editing && <ExpenseForm initial={editing} onSave={handleSave} onCancel={() => setEditing(null)} dests={[...dests, 'PAPA', 'RANDY', 'LUZ', 'Angela', 'JOHANN'].filter((v, i, a) => a.indexOf(v) === i)} />}

      <div className="bg-white border border-stone-200">
        <table className="w-full text-sm">
          <thead className="bg-stone-100 text-[10px] uppercase tracking-wider text-stone-600 sticky top-0">
            <tr>
              <th className="px-3 py-2 text-left w-20">Fecha</th>
              <th className="px-3 py-2 text-left w-16">Año</th>
              <th className="px-3 py-2 text-left">Descripción</th>
              <th className="px-3 py-2 text-center w-20">Dest.</th>
              <th className="px-3 py-2 text-right w-32">Gasto COP</th>
              <th className="px-3 py-2 text-right w-24">USD</th>
              <th className="px-3 py-2 w-16"></th>
            </tr>
          </thead>
          <tbody className="divide-y divide-stone-100">
            {filtered.map(e => (
              <tr key={e.id} className="hover:bg-stone-50">
                <td className="px-3 py-2 text-stone-600 text-xs font-mono">{e.fecha}</td>
                <td className="px-3 py-2 text-stone-700 text-xs font-mono font-semibold">{e.anio}</td>
                <td className="px-3 py-2 text-stone-800">{e.descripcion}{e.observacion && <div className="text-[11px] text-stone-500 italic mt-0.5">{e.observacion}</div>}</td>
                <td className="px-3 py-2 text-center">
                  <span className="px-2 py-0.5 text-[10px] font-bold rounded-sm" style={{
                    background: DEST_COLORS[e.destinatario]?.bg || '#F3F4F6',
                    color: DEST_COLORS[e.destinatario]?.fg || '#6B7280'
                  }}>{e.destinatario}</span>
                </td>
                <td className="px-3 py-2 text-right num font-semibold">{fmtCOP(e.gasto)}</td>
                <td className="px-3 py-2 text-right num text-emerald-700 text-xs">{fmtUSD(e.gasto / config.trm)}</td>
                <td className="px-3 py-2 flex gap-1">
                  <button onClick={() => setEditing(e)} className="text-stone-400 hover:text-orange-500"><Pencil size={14} /></button>
                  <button onClick={() => handleDelete(e.id)} className="text-stone-400 hover:text-red-500"><Trash2 size={14} /></button>
                </td>
              </tr>
            ))}
            {filtered.length === 0 && (
              <tr><td colSpan="7" className="px-3 py-12 text-center text-stone-400 italic">No hay gastos que coincidan con los filtros</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function ExpenseForm({ initial, onSave, onCancel, dests }) {
  const [draft, setDraft] = useState(initial || { fecha: new Date().toISOString().slice(0, 10), anio: new Date().getFullYear(), descripcion: '', destinatario: 'PAPA', gasto: 0, observacion: '' });
  const submit = () => {
    const g = parseDecimal(draft.gasto);
    if (!draft.descripcion || !g) return;
    onSave({ ...draft, gasto: g, anio: parseInt(draft.anio) });
  };

function IngresosTab({ incomes, setIncomes, config }) {
  const [search, setSearch] = useState('');
  const [filterYear, setFilterYear] = useState('');
  const [filterOrigen, setFilterOrigen] = useState('');
  const [editing, setEditing] = useState(null);
  const [showNew, setShowNew] = useState(false);

  const years = useMemo(() => [...new Set(incomes.map(e => e.anio).filter(Boolean))].sort(), [incomes]);
  const origenes = useMemo(() => [...new Set(incomes.map(e => e.origen))].sort(), [incomes]);

  const filtered = useMemo(() => {
    return incomes.filter(e => {
      if (filterYear && e.anio !== parseInt(filterYear)) return false;
      if (filterOrigen && e.origen !== filterOrigen) return false;
      if (search && !e.descripcion.toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    }).sort((a, b) => (b.anio || 0) - (a.anio || 0) || (b.id || 0) - (a.id || 0));
  }, [incomes, search, filterYear, filterOrigen]);

  const totalFiltered = filtered.reduce((s, e) => s + e.monto, 0);

  const handleSave = (e) => {
    if (e.id && incomes.find(x => x.id === e.id)) {
      setIncomes(incomes.map(x => x.id === e.id ? e : x));
    } else {
      const newId = Math.max(0, ...incomes.map(x => x.id || 0)) + 1;
      setIncomes([...incomes, { ...e, id: newId }]);
    }
    setEditing(null);
    setShowNew(false);
  };
  const handleDelete = (id) => {
    if (confirm('¿Eliminar este ingreso?')) setIncomes(incomes.filter(x => x.id !== id));
  };

  return (
    <div className="space-y-4">
      <div className="bg-white border border-stone-200 p-3">
        <div className="flex items-center gap-3 flex-wrap">
          <div className="flex items-center gap-2 flex-1 min-w-[200px]">
            <Search size={14} className="text-stone-400" />
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar en descripción..." className="flex-1 outline-none text-sm" />
          </div>
          <select value={filterYear} onChange={e => setFilterYear(e.target.value)} className="border border-stone-300 px-2 py-1 text-sm">
            <option value="">Todos los años</option>
            {years.map(y => <option key={y} value={y}>{y}</option>)}
          </select>
          <select value={filterOrigen} onChange={e => setFilterOrigen(e.target.value)} className="border border-stone-300 px-2 py-1 text-sm">
            <option value="">Todos los orígenes</option>
            {origenes.map(o => <option key={o} value={o}>{o}</option>)}
          </select>
          <button onClick={() => setShowNew(true)} className="flex items-center gap-1.5 bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1.5 text-sm font-medium">
            <Plus size={14} /> Nuevo ingreso
          </button>
        </div>
        <div className="text-xs text-stone-500 mt-2 font-mono">{filtered.length} ingresos · Total: <span className="text-stone-900 font-semibold">{fmtCOP(totalFiltered)}</span> · {fmtUSD(totalFiltered / config.trm)}</div>
      </div>

      {showNew && <IncomeForm onSave={handleSave} onCancel={() => setShowNew(false)} />}
      {editing && <IncomeForm initial={editing} onSave={handleSave} onCancel={() => setEditing(null)} />}

      <div className="bg-white border border-stone-200">
        <table className="w-full text-sm">
          <thead className="bg-stone-100 text-[10px] uppercase tracking-wider text-stone-600 sticky top-0">
            <tr>
              <th className="px-3 py-2 text-left w-24">Fecha</th>
              <th className="px-3 py-2 text-left w-16">Año</th>
              <th className="px-3 py-2 text-left">Descripción</th>
              <th className="px-3 py-2 text-center w-32">Origen</th>
              <th className="px-3 py-2 text-right w-32">Monto COP</th>
              <th className="px-3 py-2 text-right w-24">USD</th>
              <th className="px-3 py-2 w-16"></th>
            </tr>
          </thead>
          <tbody className="divide-y divide-stone-100">
            {filtered.map(e => (
              <tr key={e.id} className="hover:bg-stone-50">
                <td className="px-3 py-2 text-stone-600 text-xs font-mono">{e.fecha}</td>
                <td className="px-3 py-2 text-stone-700 text-xs font-mono font-semibold">{e.anio}</td>
                <td className="px-3 py-2 text-stone-800">{e.descripcion}{e.observacion && <div className="text-[11px] text-stone-500 italic mt-0.5">{e.observacion}</div>}</td>
                <td className="px-3 py-2 text-center">
                  <span className="px-2 py-0.5 text-[10px] font-bold rounded-sm" style={{
                    background: SOURCE_COLORS[e.origen]?.bg || '#F3F4F6',
                    color: SOURCE_COLORS[e.origen]?.fg || '#6B7280'
                  }}>{e.origen}</span>
                </td>
                <td className="px-3 py-2 text-right num font-semibold text-emerald-700">{fmtCOP(e.monto)}</td>
                <td className="px-3 py-2 text-right num text-emerald-700 text-xs">{fmtUSD(e.monto / config.trm)}</td>
                <td className="px-3 py-2 flex gap-1">
                  <button onClick={() => setEditing(e)} className="text-stone-400 hover:text-orange-500"><Pencil size={14} /></button>
                  <button onClick={() => handleDelete(e.id)} className="text-stone-400 hover:text-red-500"><Trash2 size={14} /></button>
                </td>
              </tr>
            ))}
            {filtered.length === 0 && (
              <tr><td colSpan="7" className="px-3 py-12 text-center text-stone-400 italic">No hay ingresos que coincidan con los filtros</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

        <div className="flex-1">
          <h4 className="font-semibold text-amber-900 text-sm">{dupGroups.length} grupos de duplicados encontrados</h4>
          <p className="text-xs text-amber-700">{totalDupRows} filas duplicadas · suman <span className="font-mono font-semibold">{fmtCOP(dupAmount)}</span> de excedente</p>
        </div>
        <button onClick={onRemoveAll} className="bg-amber-600 hover:bg-amber-700 text-white px-3 py-1.5 text-sm font-medium flex items-center gap-1.5">
          <Trash2 size={14} /> Eliminar todos los duplicados
        </button>
      </div>
      <div className="divide-y divide-amber-100 max-h-96 overflow-y-auto">
        {dupGroups.map((group, gi) => {
          const e = group[0];
          return (
            <div key={gi} className="px-4 py-2.5 flex items-center gap-3 hover:bg-amber-100/50">
              <span className="px-1.5 py-0.5 bg-amber-200 text-amber-900 text-[10px] font-bold rounded">×{group.length}</span>
              <span className="text-stone-600 text-xs font-mono w-20">{e.fecha || e.anio}</span>
              <span className="px-2 py-0.5 text-[10px] font-bold rounded-sm w-16 text-center" style={{
                background: DEST_COLORS[e.destinatario]?.bg || '#F3F4F6',
                color: DEST_COLORS[e.destinatario]?.fg || '#6B7280'
              }}>{e.destinatario}</span>
              <span className="flex-1 text-sm text-stone-700 truncate">{e.descripcion}</span>
              <span className="num font-semibold text-stone-900 w-32 text-right">{fmtCOP(e.gasto)}</span>
              <button onClick={() => onRemove(group)} className="bg-amber-500 hover:bg-amber-600 text-white px-2 py-1 text-xs font-medium flex items-center gap-1">
                <Trash2 size={12} /> Eliminar {group.length - 1}
              </button>
            </div>
          );
        })}
      </div>
      <div className="px-4 py-2 bg-amber-100/50 text-[11px] text-amber-800 italic">
        💡 Algunos pueden ser legítimos (ej. múltiples retiros en cajero el mismo día). Revisa cada grupo antes de eliminar.
      </div>
    </div>
  );
}

const rootElement = document.getElementById('root');
createRoot(rootElement).render(<App />);


document.getElementById('loading').classList.add('hidden');
</script>

</body>
</html>
