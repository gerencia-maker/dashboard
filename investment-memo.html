<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investment Memo · Propuesta de Distribución de Inversión</title>
  <meta name="description" content="Memo ejecutivo interactivo: distribución de inversión, escenarios PERT, benchmarks de mercado, marco de riesgo y proyección a 10 años.">

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230A0E1A'/%3E%3Ccircle cx='32' cy='32' r='14' fill='%23C9A961'/%3E%3C/svg%3E">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body { margin: 0; padding: 0; background: #0A0E1A; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0A0E1A; color: #C9A961;
      font-family: Georgia, serif; font-style: italic;
      transition: opacity 0.5s ease;
      z-index: 9999;
    }

      width: 12px; height: 12px; border-radius: 50%;
      background: #C9A961; margin-bottom: 16px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="loading-pulse"></div>
    <div style="letter-spacing: 0.1em; font-size: 13px;">Cargando Investment Memo</div>
  </div>

  <script>
    // Fallback de emergencia: si en 15s no cargó, muestra el error
    setTimeout(function() {
      var loading = document.getElementById('loading');
      var root = document.getElementById('root');
      if (loading && !loading.classList.contains('hidden') && (!root || root.children.length === 0)) {
        loading.innerHTML = '<div style="max-width:420px;padding:32px;text-align:center;font-family:Georgia,serif"><div style="color:#EF4444;font-size:14px;margin-bottom:16px;letter-spacing:0.15em;font-style:normal">ERROR DE CARGA</div><div style="color:#F5F2EA;font-size:14px;line-height:1.7;margin-bottom:16px">El memo no pudo compilar. Abre la consola del navegador (F12 &rarr; Console) para ver el error exacto.</div><div style="color:#9CA3B7;font-size:12px;line-height:1.6;font-style:normal">Posibles causas: bloqueo de CDN, error de sintaxis, extension del navegador interfiriendo.</div></div>';
      }
    }, 15000);
  </script>

  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useRef } = React;
    const {
      PieChart, Pie, Cell, ResponsiveContainer, Tooltip,
      LineChart, Line, XAxis, YAxis, CartesianGrid, ReferenceLine
    } = Recharts;

    const FECHA_PROPUESTA = "Mayo 2026";
    const TITULAR = "Luz Arango";

    const CATEGORIAS_BASE = [
      { id: "rv", nombre: "Renta Variable", subtitulo: "Acciones Cotizadas", pct: 0.18, riesgo: "Medio", horizonte: "Largo", mecanismo: "Mercado líquido (horizonte mínimo)", plazo: "1.5-2 años", cons: 0.05, base: 0.04, opti: 0.04, pert: 0.042, color: "#4A7BA6", benchmark: 0.1791, benchmarkLabel: "Global X AIQ ETF (17.91%)" },
      { id: "vc", nombre: "Venture Capital", subtitulo: "Etapa Temprana", pct: 0.35, riesgo: "Alto", horizonte: "Largo", mecanismo: "Venta de participación (equity privado)", plazo: "5+ años (evento de liquidez)", cons: 0.05, base: 0.132, opti: 0.175, pert: 0.126, color: "#C9A961", benchmark: 0.16, benchmarkLabel: "Cambridge VC Index (16%)" },
      { id: "ep", nombre: "Equity Privado", subtitulo: "Negocio Operativo", pct: 0.27, riesgo: "Medio", horizonte: "Mediano", mecanismo: "Venta de participación (equity privado)", plazo: "5+ años (evento de liquidez)", cons: 0.03, base: 0.05, opti: 0.09, pert: 0.053, color: "#6B7F5A", benchmark: 0.1113, benchmarkLabel: "US Restaurant ROI (11.13%)" },
      { id: "cdt", nombre: "Renta Fija", subtitulo: "CDT Colombia", pct: 0.10, riesgo: "Bajo", horizonte: "Mediano", mecanismo: "Vencimiento del título", plazo: "360 días / 1 año", cons: 0.07, base: 0.096, opti: 0.12, pert: 0.096, color: "#1F3A5F", benchmark: 0.11, benchmarkLabel: "CDT Bancos Colombia (11%)" },
      { id: "cash", nombre: "Equivalentes de Efectivo", subtitulo: "Reserva de Inversión", pct: 0.10, riesgo: "Bajo", horizonte: "Corto", mecanismo: "Liquidez inmediata", plazo: "Inmediato", cons: 0.01, base: 0.014, opti: 0.021, pert: 0.015, color: "#9CA3B7", benchmark: 0.0457, benchmarkLabel: "US Treasury 10Y (4.57%)" }
    ];

    const ESCENARIOS = [
      { id: "cons", label: "Conservador" },
      { id: "base", label: "Base" },
      { id: "opti", label: "Optimista" },
      { id: "pert", label: "PERT" }
    ];

    const fmtMoney = function(v) { return "$" + Math.round(v).toLocaleString('en-US'); };
    const fmtPct = function(v) { return (v * 100).toFixed(1) + "%"; };
    const fmtPct2 = function(v) { return (v * 100).toFixed(2) + "%"; };
    const fmtPP = function(v) { return (v >= 0 ? '+' : '') + (v * 100).toFixed(2) + "pp"; };

    const riskColor = function(r) {
      if (r === "Bajo") return { bg: "rgba(16,185,129,0.12)", border: "#10B981", text: "#10B981" };
      if (r === "Medio") return { bg: "rgba(74,123,166,0.18)", border: "#4A7BA6", text: "#8FAFCC" };
      if (r === "Alto") return { bg: "rgba(245,158,11,0.15)", border: "#F59E0B", text: "#F59E0B" };
      return { bg: "rgba(156,163,183,0.1)", border: "#9CA3B7", text: "#9CA3B7" };
    };

    const posturaColor = function(p) {
      if (p === "CONSERVADOR") return "#10B981";
      if (p === "ALINEADO") return "#8FAFCC";
      if (p === "AGRESIVO") return "#EF4444";
      return "#9CA3B7";
    };

    const getEscenarioLabel = function(id) {
      const found = ESCENARIOS.find(function(e) { return e.id === id; });
      return found ? found.label : '';
    };

    const AnimatedNumber = function(props) {
      const value = props.value;
      const formatter = props.formatter;
      const duration = props.duration || 500;
      const stateArr = useState(value);
      const display = stateArr[0];
      const setDisplay = stateArr[1];
      const prevValueRef = useRef(value);
      const frameRef = useRef(null);

      useEffect(function() {
        const startValue = prevValueRef.current;
        const endValue = value;
        if (startValue === endValue) return;
        const startTime = performance.now();
        const animate = function(currentTime) {
          const elapsed = currentTime - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          const current = startValue + (endValue - startValue) * eased;
          setDisplay(current);
          if (progress < 1) frameRef.current = requestAnimationFrame(animate);
          else prevValueRef.current = endValue;
        };
        frameRef.current = requestAnimationFrame(animate);
        return function() { cancelAnimationFrame(frameRef.current); };
      }, [value, duration]);

      return formatter(display);
    };

    const SectionLabel = function(props) {
      return (
        <div className="section-label">
          <span className="section-num">{props.num}</span>
          <span className="section-divider" />
          <span className="section-text">{props.children}</span>
        </div>
      );
    };

    const RiskPill = function(props) {
      const c = riskColor(props.riesgo);
      return <span className="risk-pill" style={{ background: c.bg, borderColor: c.border, color: c.text }}>{props.riesgo.toUpperCase()}</span>;
    };

    const InvestmentDashboard = function() {
      const montoState = useState(10000);
      const monto = montoState[0];
      const setMonto = montoState[1];

      const montoInputState = useState("10,000");
      const montoInput = montoInputState[0];
      const setMontoInput = montoInputState[1];

      const escenarioState = useState("pert");
      const escenario = escenarioState[0];
      const setEscenario = escenarioState[1];

      const stressVCState = useState(false);
      const stressVC = stressVCState[0];
      const setStressVC = stressVCState[1];

      const hoveredCatState = useState(null);
      const hoveredCat = hoveredCatState[0];
      const setHoveredCat = hoveredCatState[1];

      const visibleCatsState = useState(CATEGORIAS_BASE.map(function(c) { return c.id; }));
      const visibleCats = visibleCatsState[0];
      const setVisibleCats = visibleCatsState[1];

      const activeSectionState = useState("portada");
      const activeSection = activeSectionState[0];
      const setActiveSection = activeSectionState[1];

      const mountedState = useState(false);
      const mounted = mountedState[0];
      const setMounted = mountedState[1];

      const controlsCollapsedState = useState(false);
      const controlsCollapsed = controlsCollapsedState[0];
      const setControlsCollapsed = controlsCollapsedState[1];

      useEffect(function() { setMounted(true); }, []);

      const data = useMemo(function() {
        const cats = CATEGORIAS_BASE.map(function(c) {
          const retornoEfectivo = stressVC && c.id === "vc" ? -1.0 : c[escenario];
          const montoCat = monto * c.pct;
          const retornoDolares = montoCat * retornoEfectivo;
          const valorFinal1a = montoCat + retornoDolares;
          const valor10a = montoCat * Math.pow(1 + retornoEfectivo, 10);
          return Object.assign({}, c, {
            monto: montoCat,
            retornoEfectivo: retornoEfectivo,
            retornoDolares: retornoDolares,
            valorFinal1a: valorFinal1a,
            valor10a: valor10a
          });
        });

        const consPort = cats.reduce(function(a, c) { return a + c.pct * c.cons; }, 0);
        const basePort = cats.reduce(function(a, c) { return a + c.pct * c.base; }, 0);
        const optiPort = cats.reduce(function(a, c) { return a + c.pct * c.opti; }, 0);
        const pertPort = cats.reduce(function(a, c) { return a + c.pct * c.pert; }, 0);
        const retornoActivo = cats.reduce(function(a, c) { return a + c.pct * c.retornoEfectivo; }, 0);
        const multiplicador10a = cats.reduce(function(a, c) { return a + c.pct * Math.pow(1 + c.retornoEfectivo, 10); }, 0);
        const valorFinal10a = monto * multiplicador10a;
        const retornoDolaresTotal = cats.reduce(function(a, c) { return a + c.retornoDolares; }, 0);

        const benchPromedio = cats.reduce(function(a, c) { return a + c.benchmark; }, 0) / cats.length;
        const diffVsMercado = retornoActivo - benchPromedio;
        const postura = diffVsMercado < -0.03 ? "CONSERVADOR" : (diffVsMercado > 0.03 ? "AGRESIVO" : "ALINEADO");

        const riesgoBajo = cats.filter(function(c) { return c.riesgo === "Bajo"; }).reduce(function(a, c) { return a + c.pct; }, 0);
        const riesgoMedio = cats.filter(function(c) { return c.riesgo === "Medio"; }).reduce(function(a, c) { return a + c.pct; }, 0);
        const riesgoAlto = cats.filter(function(c) { return c.riesgo === "Alto"; }).reduce(function(a, c) { return a + c.pct; }, 0);
        const scorePonderado = riesgoBajo * 1 + riesgoMedio * 2 + riesgoAlto * 3;
        const perfilRiesgo = scorePonderado < 1.5 ? "DEFENSIVO" : (scorePonderado > 2.5 ? "AGRESIVO" : "BALANCEADO");

        const cortoIds = ["cdt", "cash"];
        const medioIds = ["rv"];
        const largoIds = ["vc", "ep"];
        const liquidoCorto = cats.filter(function(c) { return cortoIds.indexOf(c.id) >= 0; }).reduce(function(a, c) { return a + c.pct; }, 0);
        const liquidoMedio = cats.filter(function(c) { return medioIds.indexOf(c.id) >= 0; }).reduce(function(a, c) { return a + c.pct; }, 0);
        const liquidoLargo = cats.filter(function(c) { return largoIds.indexOf(c.id) >= 0; }).reduce(function(a, c) { return a + c.pct; }, 0);

        const evolucion = [];
        for (let year = 0; year <= 10; year++) {
          const row = {
            año: year,
            valor: cats.reduce(function(a, c) { return a + c.monto * Math.pow(1 + c.retornoEfectivo, year); }, 0)
          };
          cats.forEach(function(c) {
            row[c.id] = c.monto * Math.pow(1 + c.retornoEfectivo, year);
          });
          evolucion.push(row);
        }

        return { cats: cats, consPort: consPort, basePort: basePort, optiPort: optiPort, pertPort: pertPort, retornoActivo: retornoActivo, multiplicador10a: multiplicador10a, valorFinal10a: valorFinal10a, retornoDolaresTotal: retornoDolaresTotal, benchPromedio: benchPromedio, diffVsMercado: diffVsMercado, postura: postura, riesgoBajo: riesgoBajo, riesgoMedio: riesgoMedio, riesgoAlto: riesgoAlto, scorePonderado: scorePonderado, perfilRiesgo: perfilRiesgo, liquidoCorto: liquidoCorto, liquidoMedio: liquidoMedio, liquidoLargo: liquidoLargo, evolucion: evolucion };
      }, [monto, escenario, stressVC]);

      const navSections = [
        { id: "portada", label: "Portada" }, { id: "metricas", label: "Métricas" },
        { id: "escenarios", label: "Escenarios" }, { id: "composicion", label: "Composición" },
        { id: "riesgo", label: "Riesgo" }, { id: "benchmarks", label: "Benchmarks" },
        { id: "liquidez", label: "Liquidez" }, { id: "proyeccion", label: "Proyección" },
        { id: "detalle", label: "Detalle" }, { id: "timeline", label: "Timeline" },
        { id: "tesis", label: "Tesis" }, { id: "riesgos", label: "Riesgos" }
      ];

      const scrollTo = function(id) {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };

      const montoPresets = [1000, 10000, 50000, 100000, 500000, 1000000];

      const toggleCatVisibility = function(id) {
        setVisibleCats(function(prev) {
          return prev.indexOf(id) >= 0 ? prev.filter(function(x) { return x !== id; }) : prev.concat([id]);
        });
      };

      const handleMontoInputChange = function(e) {
        const raw = e.target.value.replace(/[^0-9]/g, '');
        setMontoInput(e.target.value);
        if (raw === '') setMonto(0);
        else setMonto(Math.min(Number(raw), 100000000));
      };

      const handleMontoInputBlur = function() {
        setMontoInput(monto.toLocaleString('en-US'));
      };

      const handleMontoInputFocus = function(e) { e.target.select(); };

      useEffect(function() {
        if (!document.activeElement || document.activeElement.id !== 'monto-input') {
          setMontoInput(monto.toLocaleString('en-US'));
        }
      }, [monto]);

      return (
        <div className={"app-root " + (mounted ? 'mounted' : '')}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
            :root { --bg-base: #0A0E1A; --bg-surface: #131A2C; --bg-elev: #1A2238; --bg-elev2: #232D47; --text-primary: #F5F2EA; --text-secondary: #9CA3B7; --text-tertiary: #6B7280; --border-subtle: rgba(245,242,234,0.08); --border-strong: rgba(245,242,234,0.16); --accent-gold: #C9A961; --accent-gold-dim: #8C7644; --accent-amber: #F59E0B; --accent-green: #10B981; --accent-red: #EF4444; --accent-blue: #4A7BA6; --accent-blue-light: #8FAFCC; --font-display: 'Fraunces', Georgia, serif; --font-body: 'IBM Plex Sans', system-ui, sans-serif; --font-mono: 'IBM Plex Mono', monospace; }
            * { box-sizing: border-box; margin: 0; padding: 0; }
            .app-root { background: var(--bg-base); color: var(--text-primary); font-family: var(--font-body); font-weight: 400; font-size: 14px; line-height: 1.55; min-height: 100vh; opacity: 0; transition: opacity 0.7s ease-out; padding-bottom: 80px; }
            .app-root.mounted { opacity: 1; }
            .app-root::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.96 0 0 0 0 0.95 0 0 0 0 0.92 0 0 0 0.04 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); opacity: 0.4; pointer-events: none; z-index: 100; mix-blend-mode: overlay; }
            .top-nav { position: sticky; top: 0; z-index: 50; background: rgba(10, 14, 26, 0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-subtle); }
            .nav-inner { max-width: 1320px; margin: 0 auto; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; gap: 32px; }
            .nav-brand { font-family: var(--font-display); font-weight: 500; font-size: 16px; letter-spacing: 0.02em; color: var(--text-primary); font-style: italic; }
            .nav-brand .ampersand { color: var(--accent-gold); font-weight: 400; }
            .nav-links { display: flex; gap: 2px; flex-wrap: wrap; }
            .nav-link { background: transparent; border: none; color: var(--text-secondary); font-family: var(--font-body); font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 10px; cursor: pointer; border-radius: 4px; transition: all 0.2s ease; }
            .nav-link:hover { color: var(--text-primary); background: var(--bg-elev); }
            .nav-link.active { color: var(--accent-gold); }
            .control-panel { position: sticky; top: 56px; z-index: 49; background: linear-gradient(180deg, var(--bg-surface) 0%, var(--bg-base) 100%); border-bottom: 1px solid var(--border-subtle); transition: max-height 0.3s ease, padding 0.3s ease; overflow: hidden; }
            .control-panel.collapsed { max-height: 0; border-bottom: none; }
            .control-panel:not(.collapsed) { max-height: 220px; }
            .control-inner { max-width: 1320px; margin: 0 auto; padding: 20px 32px; display: grid; grid-template-columns: 1.4fr 1.2fr auto; gap: 32px; align-items: center; }
            .control-group { display: flex; flex-direction: column; gap: 8px; }
            .control-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-secondary); font-weight: 500; display: flex; justify-content: space-between; align-items: center; }
            .control-value { font-family: var(--font-display); font-size: 22px; font-weight: 500; color: var(--accent-gold); font-style: italic; }
            .monto-input-wrapper { display: flex; align-items: baseline; gap: 4px; padding: 6px 12px; background: var(--bg-elev); border: 1px solid var(--border-subtle); border-radius: 4px; transition: border-color 0.2s ease, background 0.2s ease; }
            .monto-input-wrapper:hover { border-color: var(--border-strong); }
            .monto-input-wrapper:focus-within { border-color: var(--accent-gold); background: var(--bg-base); }

            .monto-input::placeholder { color: var(--text-tertiary); opacity: 0.4; }

            .monto-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; background: var(--accent-gold); border: 2px solid var(--bg-base); border-radius: 50%; cursor: grab; box-shadow: 0 0 0 1px var(--accent-gold); transition: transform 0.15s ease; }
            .monto-slider::-webkit-slider-thumb:hover { transform: scale(1.15); }
            .monto-slider::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.1); }
            .monto-slider::-moz-range-thumb { width: 18px; height: 18px; background: var(--accent-gold); border: 2px solid var(--bg-base); border-radius: 50%; cursor: grab; }
            .monto-presets { display: flex; gap: 4px; flex-wrap: wrap; }
            .monto-preset { background: transparent; border: 1px solid var(--border-subtle); color: var(--text-secondary); font-family: var(--font-mono); font-size: 10px; padding: 4px 10px; cursor: pointer; border-radius: 3px; transition: all 0.15s ease; letter-spacing: 0.05em; }
            .monto-preset:hover { color: var(--text-primary); border-color: var(--border-strong); }
            .monto-preset.active { background: var(--accent-gold); color: var(--bg-base); border-color: var(--accent-gold); font-weight: 600; }
            .escenario-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; background: var(--bg-elev); padding: 2px; border-radius: 4px; border: 1px solid var(--border-subtle); }
            .escenario-btn { background: transparent; border: none; color: var(--text-secondary); font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 12px; cursor: pointer; border-radius: 3px; transition: all 0.2s ease; }
            .escenario-btn:hover { color: var(--text-primary); }
            .escenario-btn.active { background: var(--bg-base); color: var(--accent-gold); box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
            .stress-toggle { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--bg-elev); border: 1px solid var(--border-subtle); border-radius: 4px; cursor: pointer; transition: all 0.2s ease; }
            .stress-toggle:hover { border-color: var(--border-strong); }

                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.15em', textTransform: 'uppercase', color: 'var(--text-secondary)', alignSelf: 'center', marginRight: 8 }}>VER POR CATEGORÍA:</div>
                {data.cats.map(function(c) {
                  return (
                    <button key={c.id} className={"cat-toggle " + (visibleCats.indexOf(c.id) >= 0 ? 'active' : 'inactive')} onClick={function() { toggleCatVisibility(c.id); }}>
                      <span className="cat-toggle-dot" style={{ background: c.color }} />{c.nombre}
                    </button>
                  );
                })}
              </div>
            </section>

            <section id="detalle" className="section">
              <SectionLabel num="08">Detalle por Categoría</SectionLabel>
              <div className="detalle-scroll">
                <table className="detalle-table">
                  <thead><tr><th>Categoría</th><th className="center">%</th><th className="right">Monto</th><th className="center">Riesgo</th><th className="center">Retorno</th><th className="right">Retorno $</th><th className="right">Valor Final 1a</th><th className="right">Valor 10a</th></tr></thead>
                  <tbody>
                    {data.cats.map(function(c) {
                      return (
                        <tr key={c.id}>
                          <td>
                            <div style={{ fontFamily: 'var(--font-display)', fontWeight: 500, color: c.color }}>● <span style={{ color: 'var(--text-primary)', marginLeft: 4 }}>{c.nombre}</span></div>
                            <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginLeft: 14, marginTop: 2 }}>{c.subtitulo}</div>
                          </td>
                          <td style={{ textAlign: 'center', fontFamily: 'var(--font-mono)', color: 'var(--accent-gold)', fontWeight: 600 }}>{fmtPct(c.pct)}</td>
                          <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)' }}><AnimatedNumber value={c.monto} formatter={fmtMoney} /></td>
                          <td style={{ textAlign: 'center' }}><RiskPill riesgo={c.riesgo} /></td>
                          <td style={{ textAlign: 'center', fontFamily: 'var(--font-mono)', color: c.retornoEfectivo < 0 ? 'var(--accent-red)' : 'var(--accent-gold)', fontWeight: 600 }}>{fmtPct2(c.retornoEfectivo)}</td>
                          <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)', color: c.retornoDolares < 0 ? 'var(--accent-red)' : 'var(--text-primary)' }}><AnimatedNumber value={c.retornoDolares} formatter={fmtMoney} /></td>
                          <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)' }}><AnimatedNumber value={c.valorFinal1a} formatter={fmtMoney} /></td>
                          <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)', color: 'var(--accent-gold)', fontWeight: 600 }}><AnimatedNumber value={c.valor10a} formatter={fmtMoney} /></td>
                        </tr>
                      );
                    })}
                    <tr style={{ background: 'var(--bg-elev)' }}>
                      <td style={{ fontFamily: 'var(--font-display)', fontWeight: 600 }}>TOTAL</td>
                      <td style={{ textAlign: 'center', fontFamily: 'var(--font-mono)', fontWeight: 700 }}>100.0%</td>
                      <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)', fontWeight: 700 }}><AnimatedNumber value={monto} formatter={fmtMoney} /></td>
                      <td></td>
                      <td style={{ textAlign: 'center', fontFamily: 'var(--font-mono)', color: 'var(--accent-gold)', fontWeight: 700 }}><AnimatedNumber value={data.retornoActivo} formatter={fmtPct2} /></td>
                      <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)', fontWeight: 700 }}><AnimatedNumber value={data.retornoDolaresTotal} formatter={fmtMoney} /></td>
                      <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)', fontWeight: 700 }}><AnimatedNumber value={monto + data.retornoDolaresTotal} formatter={fmtMoney} /></td>
                      <td style={{ textAlign: 'right', fontFamily: 'var(--font-mono)', color: 'var(--accent-gold)', fontWeight: 700 }}><AnimatedNumber value={data.valorFinal10a} formatter={fmtMoney} /></td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </section>

            <section id="timeline" className="section">
              <SectionLabel num="09">Línea de Tiempo de Ejecución · 8 Meses</SectionLabel>
              {(function() {
                const MESES = ["Jun '26", "Jul '26", "Ago '26", "Sep '26", "Oct '26", "Nov '26", "Dic '26", "Ene '27"];
                const MESES_L = ["JUNIO 2026", "JULIO 2026", "AGOSTO 2026", "SEPTIEMBRE 2026", "OCTUBRE 2026", "NOVIEMBRE 2026", "DICIEMBRE 2026", "ENERO 2027"];
                const desembolso = [monto * 0.10, monto * 0.10, monto * 0.18 / 3, monto * 0.18 / 3, monto * 0.18 / 3, monto * 0.27, 0, monto * 0.35];
                const acumulado = [];
                let sum = 0;
                for (let i = 0; i < desembolso.length; i++) { sum += desembolso[i]; acumulado.push(sum); }
                const fases = [
                  { nombre: "Equivalentes de Efectivo", pct: 0.10, color: "#9CA3B7", start: 1, end: 1 },
                  { nombre: "Renta Fija — CDT", pct: 0.10, color: "#1F3A5F", start: 1, end: 2 },
                  { nombre: "Renta Variable", pct: 0.18, color: "#4A7BA6", start: 2, end: 5 },
                  { nombre: "Equity Privado — Negocio", pct: 0.27, color: "#6B7F5A", start: 3, end: 6 },
                  { nombre: "Venture Capital", pct: 0.35, color: "#C9A961", start: 4, end: 8 }
                ];
                const hitos = [
                  [{ color: "#9CA3B7", cat: "Equivalentes de Efectivo", accion: "Apertura cuenta de alto rendimiento / money market y transferencia inicial" }, { color: "#1F3A5F", cat: "Renta Fija — CDT", accion: "Comparar tasas vigentes en bancos (Bogotá, Davivienda, BBVA, Bancolombia)" }],
                  [{ color: "#1F3A5F", cat: "Renta Fija — CDT", accion: "Constitución del CDT a 360 días en el banco con mejor tasa E.A." }, { color: "#4A7BA6", cat: "Renta Variable", accion: "Apertura de cuenta en broker (Interactive Brokers, Tyba, Renta4 o similar)" }],
                  [{ color: "#4A7BA6", cat: "Renta Variable", accion: "Primera entrada DCA: 1/3 del capital asignado (~$600 del $1,800 total)" }, { color: "#6B7F5A", cat: "Equity Privado", accion: "Identificación y first contact con negocio operativo target" }],
                  [{ color: "#4A7BA6", cat: "Renta Variable", accion: "Segunda entrada DCA: 2/3 del capital asignado" }, { color: "#6B7F5A", cat: "Equity Privado", accion: "Due diligence financiera, operativa y legal del negocio" }, { color: "#C9A961", cat: "Venture Capital", accion: "Sourcing de startup target (network, demo days, fondos de coinversión)" }],
                  [{ color: "#4A7BA6", cat: "Renta Variable", accion: "Tercera entrada DCA: posición completa armada (100% del 18%)" }, { color: "#6B7F5A", cat: "Equity Privado", accion: "Negociación de términos, valuación y pacto de socios" }, { color: "#C9A961", cat: "Venture Capital", accion: "Due diligence técnica y de equipo de la startup" }],
                  [{ color: "#6B7F5A", cat: "Equity Privado", accion: "Cierre legal y transferencia de capital — posición del 27% completa" }, { color: "#C9A961", cat: "Venture Capital", accion: "Due diligence legal y financiera de la startup" }],
                  [{ color: "#C9A961", cat: "Venture Capital", accion: "Negociación de term sheet, valuación y condiciones de salida" }],
                  [{ color: "#C9A961", cat: "Venture Capital", accion: "Cierre, firma de SAFE/Equity y wire transfer — capital 100% desplegado" }]
                ];
                return (
                  <React.Fragment>
                    <div className="timeline-summary">
                      <div className="timeline-summary-item"><div className="timeline-summary-label">Inicio</div><div className="timeline-summary-value">Junio 2026</div></div>
                      <div className="timeline-summary-item"><div className="timeline-summary-label">Cierre Estimado</div><div className="timeline-summary-value">Enero 2027</div></div>
                      <div className="timeline-summary-item"><div className="timeline-summary-label">Duración</div><div className="timeline-summary-value">8 Meses</div></div>
                      <div className="timeline-summary-item"><div className="timeline-summary-label">Capital a Desplegar</div><div className="timeline-summary-value"><AnimatedNumber value={monto} formatter={fmtMoney} /></div></div>
                    </div>
                    <div className="gantt-chart">
                      <div className="gantt-row gantt-header-row">
                        <div className="gantt-label">FASE DE EJECUCIÓN</div>
                        <div className="gantt-track">
                          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(8, 1fr)', height: '100%' }}>
                            {MESES.map(function(m, i) { return <div key={i} className="gantt-month-header">{m}</div>; })}
                          </div>
                        </div>
                      </div>
                      {fases.map(function(f, idx) {
                        return (
                          <div key={idx} className="gantt-row">
                            <div className="gantt-label">
                              <span className="gantt-dot" style={{ background: f.color }} />
                              <div>
                                <div className="gantt-fase-name">{f.nombre}</div>
                                <div className="gantt-fase-meta">{fmtMoney(monto * f.pct)} · {fmtPct(f.pct)}</div>
                              </div>
                            </div>
                            <div className="gantt-track">
                              {[1, 2, 3, 4, 5, 6, 7].map(function(i) { return <div key={i} className="gantt-divider" style={{ left: ((i / 8) * 100) + "%" }} />; })}
                              <div className="gantt-bar" style={{
                                left: "calc(" + (((f.start - 1) / 8) * 100) + "% + 6px)",
                                width: "calc(" + (((f.end - f.start + 1) / 8) * 100) + "% - 12px)",
                                background: f.color
                              }}>
                                {f.start === f.end ? "MES " + f.start : "MESES " + f.start + "–" + f.end}
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.15em', textTransform: 'uppercase', color: 'var(--text-secondary)', margin: '32px 0 16px' }}>
                      CAPITAL DESPLEGADO ACUMULADO POR MES
                    </div>
                    <div className="acumulado-grid">
                      {MESES.map(function(m, i) {
                        return (
                          <div key={i} className="acumulado-cell">
                            <div className="acumulado-mes">{m}</div>
                            <div className="acumulado-val">{fmtMoney(acumulado[i])}</div>
                            <div className="acumulado-pct">{fmtPct(acumulado[i] / monto)} desplegado</div>
                            <div className="acumulado-bar">
                              <div className="acumulado-bar-fill" style={{ width: ((acumulado[i] / monto) * 100) + "%" }} />
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.15em', textTransform: 'uppercase', color: 'var(--text-secondary)', margin: '0 0 16px' }}>
                      HITOS ACCIONABLES MES A MES
                    </div>
                    <div className="meses-detalle">
                      {MESES.map(function(m, i) {
                        return (
                          <div key={i} className="mes-card">
                            <div className="mes-card-header">
                              <div className="mes-num">{("0" + (i + 1)).slice(-2)}</div>
                              <div className="mes-mes">{m}</div>
                            </div>
                            <div className="mes-acciones">
                              {hitos[i].map(function(h, j) {
                                return (
                                  <div key={j} className="hito">
                                    <span className="hito-dot" style={{ background: h.color }} />
                                    <div>
                                      <div className="hito-cat">{h.cat}</div>
                                      <div className="hito-accion">{h.accion}</div>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </React.Fragment>
                );
              })()}
            </section>

            <section id="tesis" className="section">
              <SectionLabel num="10">Tesis de Inversión</SectionLabel>
              <div className="tesis">
                <p className="tesis-text">
                  El portafolio está estructurado bajo tres principios fundamentales:
                  <em> diversificación</em> por clase de activo para mitigar riesgo idiosincrático,
                  <em> calibración conservadora</em> de retornos esperados frente a benchmarks
                  institucionales para proteger la credibilidad de la proyección,
                  y <em>horizonte predominantemente de largo plazo</em>, aceptando iliquidez en
                  el 62% del capital a cambio de mayor potencial de retorno vía eventos de liquidez.
                </p>
                <div className="tesis-quote">
                  "Las apuestas de crecimiento se balancean con instrumentos defensivos
                  y un negocio operativo con flujo de caja proyectado."
                </div>
                <p className="tesis-text">
                  Las apuestas de crecimiento — Venture Capital y Renta Variable, que representan
                  el 53% del capital — se balancean con instrumentos defensivos (CDT y Equivalentes
                  de Efectivo, 20%) y un negocio operativo con flujo de caja proyectado (27%).
                  La validación frente a benchmarks de Cambridge Associates, Federal Reserve y
                  Banco de la República confirma que las expectativas están deliberadamente por
                  debajo del mercado, dejando margen razonable para superar la proyección base.
                </p>
              </div>
            </section>

            <section id="riesgos" className="section">
              <SectionLabel num="11">Riesgos Principales</SectionLabel>
              <div className="riesgo-item"><div className="riesgo-num">01</div><div><div className="riesgo-title">Concentración en Venture Capital (35%)</div><div className="riesgo-desc">Por estadística de la industria, 65-75% de inversiones VC en etapa temprana no devuelven capital (Cambridge Associates, NBER). Esta es la asignación más alta del portafolio, lo que incrementa la dependencia del éxito de esta apuesta. Puedes activar el Stress Test arriba para simular el escenario de pérdida total en tiempo real sobre todo el dashboard.</div></div></div>
              <div className="riesgo-item"><div className="riesgo-num">02</div><div><div className="riesgo-title">Iliquidez del 62% del capital</div><div className="riesgo-desc">La mayor parte de la inversión queda comprometida a 5+ años hasta evento de liquidez (venta de participación, ronda secundaria o IPO). No es capital disponible para emergencias y exige disciplina de largo plazo.</div></div></div>
              <div className="riesgo-item"><div className="riesgo-num">03</div><div><div className="riesgo-title">Dependencia de ejecución operativa (27%)</div><div className="riesgo-desc">El 27% del portafolio está en Equity Privado de un negocio operativo, lo que requiere gestión activa y exposición a riesgo sectorial. El retorno esperado del 5.3% PERT está calibrado por debajo del benchmark de industria restaurantera (11.1%) para reflejar riesgo de ejecución.</div></div></div>
              <div className="riesgo-item"><div className="riesgo-num">04</div><div><div className="riesgo-title">Exposición a renta variable (18%)</div><div className="riesgo-desc">El 18% en acciones cotizadas está sujeto a volatilidad de mercado (~16% anual histórico del S&amp;P 500) y drawdowns potenciales del 30-40% en eventos sistémicos.</div></div></div>
              <div className="riesgo-item"><div className="riesgo-num">05</div><div><div className="riesgo-title">Riesgo cambiario USD/COP</div><div className="riesgo-desc">El portafolio mixto USD/COP está expuesto a fluctuaciones del tipo de cambio que pueden amplificar o reducir el retorno nominal en cualquier moneda de medición.</div></div></div>
              <div className="disclaimer">
                <div className="disclaimer-label">Declaración de Responsabilidad</div>
                <div className="disclaimer-text">Esta propuesta es de carácter ilustrativo y no constituye recomendación ni asesoría financiera, tributaria o legal. Los retornos pasados no garantizan resultados futuros. Las proyecciones se basan en supuestos de mercado vigentes a mayo de 2026, sujetos a cambios. Los benchmarks utilizados (Cambridge Associates, Federal Reserve, Banco de la República, Macrotrends, Global X) son fuentes públicas y se citan a título de referencia.</div>
              </div>
            </section>

            <footer className="footer">Investment Memo · {FECHA_PROPUESTA}</footer>
          </div>
        </div>
      );
    };

    try {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<InvestmentDashboard />);
      setTimeout(function() {
        const loading = document.getElementById('loading');
        if (loading) {
          loading.classList.add('hidden');
          setTimeout(function() { if (loading.parentNode) loading.parentNode.removeChild(loading); }, 500);
        }
      }, 800);
    } catch (err) {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.innerHTML = '<div style="max-width:420px;padding:32px;text-align:center;font-family:Georgia,serif"><div style="color:#EF4444;font-size:14px;margin-bottom:16px;letter-spacing:0.15em">ERROR AL RENDERIZAR</div><div style="color:#F5F2EA;font-size:13px;line-height:1.6">' + err.message + '</div></div>';
      }
    }
  </script>
</body>
</html>
